      ctx.fillStyle='#151d12'; ctx.fillRect(-6.5,9,2.6,2.6); ctx.fillRect(4,9,2.6,2.6); // exhausts
      glow(0,11,14,'orange',0.35+0.2*Math.sin(perf*13));
      ctx.strokeStyle='#33472a';
      ctx.beginPath(); ctx.moveTo(-7,-6); ctx.lineTo(-10.5,-12); ctx.stroke(); // antenna
      ctx.fillStyle='#8aa872'; ctx.fillRect(-11,-13,1.4,1.4);
      ctx.rotate(a);
      gr=ctx.createLinearGradient(0,-3,0,3);
      gr.addColorStop(0,'#c2d2b2'); gr.addColorStop(1,'#778a66');
      ctx.fillStyle=gr; ctx.fillRect(3,-2.8,17,5.6);
      ctx.fillStyle='#556648'; ctx.fillRect(9,-3.3,3.4,6.6); // thermal sleeve
      ctx.fillStyle='#3c4a33'; ctx.fillRect(17,-3.6,4,7.2);
      ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(19.6,-2.2,1.4,4.4); // bore
      if(charge>0) glow(21,0,18,'red',charge*0.9);
      ctx.rotate(-a);
      const cg=ctx.createRadialGradient(-2,-2,1,0,0,7);
      cg.addColorStop(0,'#8aa872'); cg.addColorStop(1,'#33472a');
      ctx.fillStyle=cg;
      ctx.beginPath(); ctx.arc(0,0,6.4,0,TAU); ctx.fill();
      ctx.fillStyle='#556648'; // turret ring bolts
      for(let i=0;i<6;i++){
        const ba=i*TAU/6+0.5;
        ctx.fillRect(Math.cos(ba)*4.8-0.7,Math.sin(ba)*4.8-0.7,1.4,1.4);
      }
      break;
    }
    case 'spotter':{
      ctx.fillStyle='rgba(0,0,0,0.28)';
      ctx.beginPath(); ctx.ellipse(3,10,8,4,0,0,TAU); ctx.fill();
      const bob=Math.sin(e.t*6)*1.4;
      ctx.translate(0,bob);
      ctx.save(); ctx.rotate(e.t*14);
      ctx.strokeStyle='rgba(190,205,230,0.3)'; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0);
      ctx.moveTo(0,-10); ctx.lineTo(0,10); ctx.stroke();
      ctx.restore();
      const gr=ctx.createRadialGradient(-2,-3,1,0,0,9.5);
      gr.addColorStop(0,'#8a9ac0'); gr.addColorStop(0.6,'#4e5f88'); gr.addColorStop(1,'#26304a');
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.ellipse(0,0,9,7,0,0,TAU); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.ellipse(0,0,6.4,4.6,0,0,TAU); ctx.stroke();
      ctx.strokeStyle='#26304a'; ctx.lineWidth=1.4; // landing skids
      ctx.beginPath(); ctx.moveTo(-6,7.5); ctx.lineTo(-2,5.5); ctx.moveTo(6,7.5); ctx.lineTo(2,5.5); ctx.stroke();
      // the lamp — housing + lens pointing along the beam
      const alarming=e.alarm>0.15;
      ctx.save(); ctx.rotate(e.dir);
      ctx.fillStyle='#1c2436'; rrFill(3.5,-2.8,5.5,5.6,1.5);
      ctx.fillStyle=alarming?'#ff6a5a':'#ffe9a8';
      ctx.beginPath(); ctx.arc(7.6,0,2.8,0,TAU); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(6.9,-0.7,1,0,TAU); ctx.fill();
      ctx.restore();
      ctx.fillStyle='#39434d';
      ctx.beginPath(); ctx.arc(0,0,1.5,0,TAU); ctx.fill();
      glow(0,0,16,alarming?'red':'yellow',0.7);
      // faint beam hint (full beam is carved out of the darkness)
      ctx.save(); ctx.globalAlpha=alarming?0.20:0.10;
      ctx.fillStyle=alarming?'#ff5040':'#ffe9a8';
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.arc(0,0,150,e.dir-0.33,e.dir+0.33); ctx.closePath(); ctx.fill();
      ctx.restore();
      break;
    }
    case 'mine':{
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(0,3,7,3.5,0,0,TAU); ctx.fill();
      const up=e.phase===1?2:0;
      ctx.translate(0,-up);
      const gr=ctx.createRadialGradient(-2,-2,1,0,0,8.5);
      gr.addColorStop(0,e.phase===1?'#a86868':'#6a7078');
      gr.addColorStop(1,e.phase===1?'#4a1c1c':'#2c3138');
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.arc(0,0,7.5,0,TAU); ctx.fill();
      ctx.save(); ctx.setLineDash([2.6,2.2]);
      ctx.strokeStyle=e.phase===1?'rgba(255,120,80,0.55)':'rgba(216,184,48,0.4)';
      ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(0,0,5,0,TAU); ctx.stroke();
      ctx.restore();
      ctx.fillStyle='rgba(255,255,255,0.16)';
      ctx.beginPath(); ctx.ellipse(-2.2,-2.6,2.6,1.4,-0.6,0,TAU); ctx.fill();
      for(let i=0;i<6;i++){
        const sa=i*TAU/6+0.3;
        ctx.fillStyle='#1c2126';
        ctx.fillRect(Math.cos(sa)*7-1.2,Math.sin(sa)*7-1.2,2.4,2.4);
        ctx.fillStyle='rgba(255,255,255,0.2)';
        ctx.fillRect(Math.cos(sa)*7.8-0.6,Math.sin(sa)*7.8-0.6,1.2,1.2);
      }
      if(e.phase===1){
        const fl=Math.floor(e.arm*10)%2;
        ctx.fillStyle=fl?'#ff3030':'#801010';
        ctx.beginPath(); ctx.arc(0,0,2.6,0,TAU); ctx.fill();
        glow(0,0,22,'red',fl?0.9:0.4);
      }else{
        ctx.fillStyle='#3d444c';
        ctx.beginPath(); ctx.arc(0,0,2.4,0,TAU); ctx.fill();
      }
      break;
    }
    case 'shield':{
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(0,3,8,4.5,0,0,TAU); ctx.fill();
      ctx.rotate(a+Math.PI/2);
      const step=Math.sin(e.t*7)*2;
      ctx.fillStyle='#1c2536'; ctx.fillRect(-5,-1+step,3.6,6.5); ctx.fillRect(1.4,-1-step,3.6,6.5);
      let gr=ctx.createLinearGradient(-6,-8,6,5);
      gr.addColorStop(0,'#7d96c8'); gr.addColorStop(0.5,'#4a628f'); gr.addColorStop(1,'#243350');
      ctx.fillStyle=gr; rrFill(-6.5,-8,13,13,3);
      ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1;
      rrPath(ctx,-6.5,-8,13,13,3); ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-6.5,1.4,13,1.6);
      // shield emitter prongs
      ctx.fillStyle='#8ba4d4';
      ctx.fillRect(-8.6,-9.5,2,5); ctx.fillRect(6.6,-9.5,2,5);
      if(e.shieldOff<=0){
        ctx.fillStyle='#bfe6ff';
        ctx.fillRect(-8.6,-9.5,2,1.4); ctx.fillRect(6.6,-9.5,2,1.4);
        glow(-7.6,-9,7,'cyan',0.6); glow(7.6,-9,7,'cyan',0.6);
      }
      ctx.fillStyle='#c9d4e8'; ctx.fillRect(-1.2,-15,2.4,8);
      ctx.fillStyle='#8b99b8'; ctx.fillRect(-1.2,-9.5,2.4,2);
      if(charge>0) glow(0,-15,14,'red',charge*0.8);
      const hg=ctx.createRadialGradient(-1,-5,0.5,0,-3.5,5);
      hg.addColorStop(0,'#8ba4d4'); hg.addColorStop(1,'#2a3a5c');
      ctx.fillStyle=hg;
      ctx.beginPath(); ctx.arc(0,-3.5,4.6,0,TAU); ctx.fill();
      ctx.fillStyle='#dff0ff'; ctx.fillRect(-2.8,-5.4,5.6,1.6);
      // energy shield arc (front) — drops after firing
      if(e.shieldOff<=0){
        ctx.save(); ctx.globalCompositeOperation='lighter';
        ctx.globalAlpha=0.55+0.2*Math.sin(perf*9);
        ctx.strokeStyle='#7ec8ff'; ctx.lineWidth=2.6;
        ctx.beginPath(); ctx.arc(0,-4,13,-Math.PI*0.83,-Math.PI*0.17); ctx.stroke();
        ctx.restore();
        glow(0,-14,20,'cyan',0.3);
      }
      break;
    }
  }
  ctx.restore();
}

function drawPods(b){
  for(const pod of b.pods){
    ctx.save(); ctx.translate(pod.dx,pod.dy);
    if(pod.hp>0){
      const dmgf=pod.hp/pod.max;
      const tp=nearestP(b.x+pod.dx,b.y+pod.dy);
      const ca=Math.atan2(tp.y-(b.y+pod.dy),tp.x-(b.x+pod.dx));
      const pg=ctx.createRadialGradient(-3,-3,1,0,0,13);
      if(b.kind===1){ pg.addColorStop(0,'#a48cc8'); pg.addColorStop(1,'#37264e'); }
      else{ pg.addColorStop(0,'#c89468'); pg.addColorStop(1,'#4e3016'); }
      ctx.fillStyle=pg;
      ctx.beginPath(); ctx.arc(0,0,12,0,TAU); ctx.fill();
      if(dmgf<0.5){ ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(-6,-8,7,5); }
      ctx.rotate(ca);
      const bg2=ctx.createLinearGradient(0,-3,0,3);
      if(b.kind===1){ bg2.addColorStop(0,'#c4b2e2'); bg2.addColorStop(1,'#6f5a92'); }
      else{ bg2.addColorStop(0,'#e2c8a8'); bg2.addColorStop(1,'#8a6038'); }
      ctx.fillStyle=bg2; ctx.fillRect(0,-3,17,6);
      if(b.ready&&b.at1<0.35) glow(18,0,20,b.kind===1?'magenta':'orange',(0.35-b.at1)/0.35);
    }else{
      // destroyed stub
      ctx.fillStyle='#14090a';
      ctx.beginPath(); ctx.arc(0,0,10,0,TAU); ctx.fill();
      ctx.fillStyle='#2c1812';
      ctx.beginPath(); ctx.arc(2,-2,5,0,TAU); ctx.fill();
      glow(0,0,16,'orange',0.25+0.3*Math.random());
      if(Math.random()<0.1)
        parts.push({kind:'smoke',x:b.x+pod.dx,y:b.y+pod.dy,dx:(Math.random()-0.5)*8,dy:-14,t:0,dur:1,r:4});
    }
    ctx.restore();
  }
}

function bossBar(frac,c0,c1,gname){
  ctx.fillStyle='rgba(6,10,16,0.72)'; rrFill(18,22,W-36,9,4);
  const gr2=ctx.createLinearGradient(20,0,W-20,0);
  gr2.addColorStop(0,c0); gr2.addColorStop(1,c1);
  ctx.fillStyle=gr2; rrFill(20,23.5,(W-40)*Math.max(0,frac),6,3);
  if(frac>0.02&&gname) glow(20+(W-40)*frac,26.5,14,gname,0.6);
  ctx.strokeStyle='rgba(255,255,255,0.18)'; rrPath(ctx,18,22,W-36,9,4); ctx.stroke();
}
function drawBoss(){
  const b=boss;
  const frac=Math.max(0,b.hp/b.maxHp);
  ctx.save(); ctx.translate(b.x,b.y);
  if(b.kind===103){ // GEMINI INTERCEPTORS
    ctx.restore();
    const en2=b.twins.filter(t2=>!t2.dead);
    const enr=en2.length===1;
    b.twins.forEach((tw,i)=>{
      if(tw.dead) return;
      ctx.save(); ctx.translate(tw.x,tw.y);
      // engine wash
      glow(0,16,22,i===0?'cyan':'orange',0.5+0.2*Math.sin(perf*20+i));
      if(enr) glow(0,0,54,'red',0.35+0.2*Math.sin(perf*9));
      // fuselage
      let gr=ctx.createLinearGradient(0,-16,0,16);
      if(i===0){ gr.addColorStop(0,b.flash>0?'#cfe0ec':'#4e6a80'); gr.addColorStop(1,'#1c2c3a'); }
      else{ gr.addColorStop(0,b.flash>0?'#ecd8c0':'#8a5c34'); gr.addColorStop(1,'#3a2412'); }
      ctx.fillStyle=gr;
      ctx.beginPath();
      ctx.moveTo(0,-18); ctx.lineTo(7,-4); ctx.lineTo(6,14); ctx.lineTo(-6,14); ctx.lineTo(-7,-4);
      ctx.closePath(); ctx.fill();
      // wings
      ctx.fillStyle=i===0?'#2c4050':'#503018';
      ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(-22,10); ctx.lineTo(-18,14); ctx.lineTo(-5,8); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(22,10); ctx.lineTo(18,14); ctx.lineTo(5,8); ctx.closePath(); ctx.fill();
      // canopy
      ctx.fillStyle='rgba(140,220,255,0.5)';
      ctx.beginPath(); ctx.ellipse(0,-6,3,5.5,0,0,TAU); ctx.fill();
      // wingtip strobes
      const st=Math.floor(perf*4+i)%2;
      ctx.fillStyle=st?'#ff5050':'#3a1418'; ctx.fillRect(-21,9,3,3);
      ctx.fillStyle=st?'#183a20':'#5aff8a'; ctx.fillRect(18,9,3,3);
      // per-twin health pip bar
      ctx.fillStyle='rgba(6,10,16,0.7)'; rrFill(-14,-26,28,4,2);
      ctx.fillStyle=enr?'#ff7050':(i===0?'#8cc0ff':'#ffb050');
      rrFill(-14,-26,28*Math.max(0,tw.hp/110),4,2);
      ctx.restore();
    });
    if(b.ready) bossBar(frac,'#8cc0ff','#ffb050','white');
    return;
  }
  if(b.kind>=100){ // mid-boss gate machines
    const rust=b.kind===102;
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(0,20,86,10,0,0,TAU); ctx.fill();
    let gr=ctx.createLinearGradient(0,-17,0,17);
    if(rust){
      gr.addColorStop(0,b.flash>0?'#e8cba8':'#8a5a30');
      gr.addColorStop(1,b.flash>0?'#b89468':'#3a2414');
    }else{
      gr.addColorStop(0,b.flash>0?'#c8d4e2':'#5a6a7a');
      gr.addColorStop(1,b.flash>0?'#98a8ba':'#242c36');
    }
    ctx.fillStyle=gr; rrFill(-88,-17,176,34,8);
    ctx.strokeStyle='rgba(255,255,255,0.12)'; rrPath(ctx,-88,-17,176,34,8); ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.3)';
    for(const gx of [-70,-36,22,56]) ctx.fillRect(gx,-13,3,26);
    ctx.fillStyle=rust?'#a8845c':'#8ca0b4'; // hull bolts
    for(let i=0;i<10;i++){ ctx.fillRect(-82+i*18,-14.5,1.8,1.8); ctx.fillRect(-82+i*18,11.5,1.8,1.8); }
    for(const ex2 of [-88,80]){ // striped end caps
      for(let i=0;i<3;i++){
        ctx.fillStyle=i%2?'rgba(216,184,48,0.5)':'rgba(0,0,0,0.5)';
        ctx.fillRect(ex2,-15+i*10,8,8);
      }
    }
    if(rust){ // drill cones under the barge
      ctx.fillStyle='#2c1c0e';
      for(const dx2 of [-30,0,30]){
        ctx.beginPath(); ctx.moveTo(dx2-9,15); ctx.lineTo(dx2+9,15); ctx.lineTo(dx2,26); ctx.closePath(); ctx.fill();
      }
    }
    for(const ox of [-58,58]){ // emitter orbs
      const eg=ctx.createRadialGradient(ox-3,-3,1,ox,0,13);
      if(rust){ eg.addColorStop(0,'#e2c8a8'); eg.addColorStop(1,'#4e3016'); }
      else{ eg.addColorStop(0,'#b8cade'); eg.addColorStop(1,'#2c3846'); }
      ctx.fillStyle=eg;
      ctx.beginPath(); ctx.arc(ox,0,12,0,TAU); ctx.fill();
      if(b.ready&&b.at1<0.3) glow(ox,0,20,rust?'orange':'cyan',(0.3-b.at1)/0.3);
    }
    const pulse=0.5+0.5*Math.sin(b.t*5);
    glow(0,0,44+pulse*12,rust?'orange':'cyan',0.45);
    const cg=ctx.createRadialGradient(0,0,1,0,0,10+pulse*1.5);
    cg.addColorStop(0,'#fff'); cg.addColorStop(1,rust?'#c05a10':'#2a6a9a');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,0,9+pulse*1.5,0,TAU); ctx.fill();
    if(b.flash>0){
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.min(1,b.flash*6);
      ctx.fillStyle='#fff'; rrFill(-88,-17,176,34,8);
      ctx.restore();
    }
    ctx.restore();
    if(b.ready){ // shared HP bar

    if(st===0) glow(-68,10,14,'red',0.8);
    if(st===1) glow(68,10,14,'green',0.8);
    drawPods(b);
    // core lamp
    const pulse=0.5+0.5*Math.sin(b.t*6);
    glow(0,10,58+pulse*16,'cyan',0.5);
    const cg=ctx.createRadialGradient(0,10,1,0,10,12+pulse*2);
    cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.5,'#bfeaff'); cg.addColorStop(1,'#2a6a9a');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,10,11+pulse*2,0,TAU); ctx.fill();
    ctx.restore();
  }else{
    // SIEGE CRAWLER — rust palette
    for(const tx of [-92,68]){
      ctx.fillStyle='#17110a'; rrFill(tx,-28,24,60,4);
      ctx.fillStyle='rgba(255,255,255,0.09)';
      const roll=(b.t*30)%8;
      for(let i=0;i<8;i++) ctx.fillRect(tx+2,-26+((roll+i*8)%56),20,2.2);
    }
    glow(-80,30,40,'orange',0.3+0.15*Math.sin(perf*9));
    glow(80,30,40,'orange',0.3+0.15*Math.sin(perf*9+1));
    let gr=ctx.createLinearGradient(0,-32,0,34);
    gr.addColorStop(0,b.flash>0?'#e8cba8':'#8a5a30');
    gr.addColorStop(0.5,b.flash>0?'#d4b48e':'#6a4020');
    gr.addColorStop(1,b.flash>0?'#b89468':'#3a2414');
    ctx.fillStyle=gr;
    ctx.beginPath();
    ctx.moveTo(-70,-14); ctx.lineTo(-46,-32); ctx.lineTo(46,-32); ctx.lineTo(70,-14);
    ctx.lineTo(70,26); ctx.lineTo(-70,26); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,220,160,0.14)'; ctx.stroke();
    // front plow
    ctx.fillStyle='#2c1c0e';
    ctx.beginPath(); ctx.moveTo(-60,26); ctx.lineTo(60,26); ctx.lineTo(44,38); ctx.lineTo(-44,38); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(-44,26,88,2);
    for(let i=0;i<7;i++){ // plow hazard dashes
      ctx.fillStyle=i%2?'rgba(216,184,48,0.45)':'rgba(0,0,0,0.45)';
      ctx.fillRect(-42+i*12,28.5,10,3.4);
    }
    ctx.fillStyle='#a8845c'; // hull rivets
    for(let i=0;i<8;i++){ ctx.fillRect(-56+i*16,-29,1.8,1.8); ctx.fillRect(-56+i*16,22,1.8,1.8); }
    ctx.fillStyle='#241708'; // exhaust stacks
    ctx.fillRect(-14,-38,5,8); ctx.fillRect(9,-38,5,8);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(-14,-38,5,1.6); ctx.fillRect(9,-38,5,1.6);
    glow(-11.5,-38,10,'orange',0.25+0.2*Math.sin(perf*11));
    glow(11.5,-38,10,'orange',0.25+0.2*Math.sin(perf*11+1));
    ctx.fillStyle='rgba(0,0,0,0.30)';
    for(const gx of [-34,-6,22]) ctx.fillRect(gx,-24,4,44);
    for(let i=0;i<4;i++){
      const on=Math.floor(perf*5+i)%4===0;
      ctx.fillStyle=on?'#ffb050':'#4a3018';
      ctx.fillRect(-30+i*20,-28,5,3);
      if(on) glow(-27.5+i*20,-26.5,10,'orange',0.6);
    }
    drawPods(b);
    const pulse=0.5+0.5*Math.sin(b.t*5);
    glow(0,4,54+pulse*16,'orange',0.5);
    const cg=ctx.createRadialGradient(0,4,1,0,4,13+pulse*2);
    cg.addColorStop(0,'#fff8e0'); cg.addColorStop(0.4,'#ffcf80'); cg.addColorStop(1,'#c05a10');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,4,12+pulse*2,0,TAU); ctx.fill();
  }
  if(b.flash>0){
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.min(1,b.flash*6);
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(0,b.kind===1?10:4,16,0,TAU); ctx.fill();
    ctx.restore();
  }
  if(b.mode==='windup'){ // dive telegraph
    const wq=1-b.moveT/0.55;
    glow(0,8,90+wq*60,'red',0.35+wq*0.45);
  }
  if(frac<0.66){
    ctx.fillStyle='#12091c'; rrFill(-50,-20,14,10,2); rrFill(28,-26,12,9,2);
    if(Math.random()<0.12) parts.push({kind:'smoke',x:b.x-43,y:b.y-15,dx:6,dy:-12,t:0,dur:1.1,r:4});
  }
  if(frac<0.33){
    ctx.fillStyle='#12091c'; rrFill(10,8,16,12,2); rrFill(-34,14,12,10,2);
    glow(18,14,18,'orange',0.4+0.4*Math.random());
    if(Math.random()<0.25) parts.push({kind:'smoke',x:b.x+18,y:b.y+12,dx:(Math.random()-0.5)*10,dy:-16,t:0,dur:1.2,r:5});
  }
  ctx.restore();
  if(b.ready){
    ctx.fillStyle='rgba(6,10,16,0.72)'; rrFill(18,22,W-36,9,4);
    const gr2=ctx.createLinearGradient(20,0,W-20,0);
    if(b.kind===1){ gr2.addColorStop(0,'#ff4a90'); gr2.addColorStop(1,'#b03080'); }
    else{ gr2.addColorStop(0,'#ffb050'); gr2.addColorStop(1,'#c05a10'); }
    ctx.fillStyle=gr2; rrFill(20,23.5,(W-40)*frac,6,3);
    if(frac>0.02) glow(20+(W-40)*frac,26.5,14,b.kind===1?'magenta':'orange',0.6);
    ctx.strokeStyle='rgba(255,255,255,0.18)'; rrPath(ctx,18,22,W-36,9,4); ctx.stroke();
  }
}

function drawHUD(){
  ctx.fillStyle='rgba(5,9,15,0.72)';
  ctx.fillRect(0,0,W,20);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(0,19.4,W,0.8);
  ctx.textBaseline='top';
  ctx.font='700 9px '+FONT;
  ctx.textAlign='left';
  ctx.fillStyle='#9aa3ad'; ctx.fillText('SCORE',5,6);
  ctx.fillStyle='#fff'; ctx.font='800 10px '+FONT;
  ctx.fillText(String(score),38,5);
  const drawChip=(pl,cx,small)=>{
    const wtxt=pl.superT>0?'BURNER':(pl.weapon?'3-WAY':'TWIN')+' L'+pl.power;
    ctx.font='800 '+(small?7:8)+'px '+FONT;
    const chipW=ctx.measureText(wtxt).width+12;
    ctx.fillStyle=pl.superT>0?'rgba(255,146,52,0.22)':pl.weapon?'rgba(255,140,26,0.18)':'rgba(140,212,255,0.15)';
    rrFill(cx-chipW/2,4,chipW,12,6);
    ctx.strokeStyle=pl.superT>0?'rgba(255,170,80,0.7)':pl.weapon?'rgba(255,160,60,0.6)':'rgba(140,212,255,0.55)';
    rrPath(ctx,cx-chipW/2,4,chipW,12,6); ctx.stroke();
    ctx.textAlign='center';
    ctx.fillStyle=pl.superT>0?'#ffcf80':pl.weapon?'#ffc37a':'#aadeff';
    ctx.fillText(wtxt,cx,7);
  };
  if(P2){ drawChip(P,W/2-46,true); drawChip(P2,W/2+46,true); }
  else drawChip(P,W/2);
  ctx.textAlign='right';
  ctx.fillStyle='#9aa3ad'; ctx.fillText('HI',W-64,7);
  ctx.fillStyle='#ffd24a'; ctx.font='800 10px '+FONT;
  ctx.fillText(String(Math.max(topScore(),score)),W-28,5);
  // chain
  if(chain>1){
    ctx.textAlign='left'; ctx.font='800 9px '+FONT;
    ctx.fillStyle='#ffd24a';
    let mtxt=chainMult().toFixed(2);
    mtxt=mtxt.replace(/0+$/,'').replace(/\.$/,'');
    ctx.fillText('CHAIN ×'+mtxt,5,25);
    ctx.fillStyle='rgba(255,210,74,0.25)'; ctx.fillRect(5,37,44,3);
    ctx.fillStyle='#ffd24a'; ctx.fillRect(5,37,44*(chainT/1.5),3);
  }
  if(!P2){
    // lives
    for(let i=0;i<Math.min(P.lives,6);i++){
      const lx=10+i*13, ly=H-11;
      ctx.fillStyle='#2e8b8b';
      ctx.beginPath(); ctx.arc(lx,ly,4.4,0,TAU); ctx.fill();
      ctx.fillStyle='#0a2a2a'; ctx.fillRect(lx-3.4,ly-2.2,6.8,2);
    }
    if(SET.diff==='normal'){
      for(let i=0;i<3;i++){
        const sx=10+Math.min(P.lives,6)*13+6+i*8;
        ctx.fillStyle=i<P.shield?'#8fd4ff':'rgba(140,212,255,0.15)';
        rrFill(sx,H-15,5,8,2);
      }
    }
    for(let i=0;i<P.bombs;i++){
      const bx=11+i*13, by=H-26;
      const og=ctx.createRadialGradient(bx-1,by-1,0.5,bx,by,4.5);
      og.addColorStop(0,'#dceeff'); og.addColorStop(1,'#3a70c0');
      ctx.fillStyle=og;
      ctx.beginPath(); ctx.arc(bx,by,4.2,0,TAU); ctx.fill();
      glow(bx,by,11,'blue',0.5);
    }
    const ew=118, ex=W-ew-8, ey=H-15;
    const frac=clamp(P.energy/100,0,1);
    const low=P.energy<25;
    ctx.font='700 8px '+FONT; ctx.textAlign='right';
    ctx.fillStyle=low?'#ff7070':'#9aa3ad';
    ctx.fillText('ENERGY',ex-5,ey+1);
    ctx.fillStyle='rgba(5,9,15,0.75)'; rrFill(ex-2,ey-2,ew+4,13,5);
    let col1,col2;
    if(low){ const fl=Math.floor(perf*6)%2; col1=fl?'#ff5050':'#a01818'; col2=fl?'#c02020':'#701010'; }
    else if(frac>0.5){ col1='#6fe86f'; col2='#2f9f3f'; }
    else { col1='#ffd24a'; col2='#c09020'; }
    const gr=ctx.createLinearGradient(0,ey,0,ey+9);
    gr.addColorStop(0,col1); gr.addColorStop(1,col2);
    ctx.fillStyle=gr;
    if(frac>0.02) rrFill(ex,ey,ew*frac,9,4);
    ctx.fillStyle='rgba(255,255,255,0.22)';
    if(frac>0.02) rrFill(ex,ey,ew*frac,3.5,2);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; rrPath(ctx,ex-2,ey-2,ew+4,13,5); ctx.stroke();
    if(low) glow(ex+ew*frac,ey+4.5,16,'red',0.5+0.3*Math.sin(perf*12));
    if(P.superT>0){
      ctx.fillStyle='#ffcf80'; ctx.textAlign='right'; ctx.fillText('BURNER',ex-5,ey-13);
      ctx.fillStyle='rgba(5,9,15,0.75)'; rrFill(ex-2,ey-15,ew+4,8,4);
      const bgr=ctx.createLinearGradient(0,ey-14,0,ey-8);
      bgr.addColorStop(0,'#ffb050'); bgr.addColorStop(1,'#c05a10');
      ctx.fillStyle=bgr; rrFill(ex,ey-13.5,ew*(P.superT/8),5,2.5);
    }
  }else{
    drawMiniHud(P,true); drawMiniHud(P2,false);
  }
  // popups
  ctx.textAlign='center'; ctx.font='800 9px '+FONT;
  for(const p of popups){
    ctx.globalAlpha=1-p.t/0.8;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(p.txt,p.x+1,p.y-p.t*28+1);
    ctx.fillStyle='#ffd24a'; ctx.fillText(p.txt,p.x,p.y-p.t*28);
  }
  ctx.globalAlpha=1;
  if(msgTimer>0){
    ctx.textAlign='center'; ctx.font='800 13px '+FONT;
    const a2=clamp(msgTimer*3,0,1);
    ctx.globalAlpha=a2;
    glow(W/2,116,120,'yellow',0.22*a2);
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillText(msgText,W/2+1.2,111.2);
    ctx.fillStyle=Math.floor(perf*8)%2?'#ffe040':'#ffffff';
    ctx.fillText(msgText,W/2,110);
    ctx.globalAlpha=1;
  }
}

function drawMiniHud(pl,left){
  const ew=92, ex=left?6:W-6-ew, ey=H-13;
  const rowY=H-27;
  ctx.textBaseline='top'; ctx.font='800 8px '+FONT; ctx.textAlign='left';
  ctx.fillStyle=pl.pal.b0; ctx.fillText('P'+(pl.pi+1),ex,rowY);
  if(pl.out){
    ctx.fillStyle='#5a626c'; ctx.fillText('OUT',ex+18,rowY);
  }else{
    let cx0=ex+18;
    for(let i=0;i<Math.min(pl.lives,5);i++){
      ctx.fillStyle=pl.pal.b1;
      ctx.beginPath(); ctx.arc(cx0+4+i*9,rowY+4,3.2,0,TAU); ctx.fill();
    }
    cx0+=Math.min(pl.lives,5)*9+9;
    for(let i=0;i<pl.bombs;i++){
      ctx.fillStyle='#6ab0ff';
      ctx.beginPath(); ctx.arc(cx0+3+i*8,rowY+4,2.6,0,TAU); ctx.fill();
    }
    if(SET.diff==='normal'){
      for(let i=0;i<3;i++){
        ctx.fillStyle=i<pl.shield?'#8fd4ff':'rgba(140,212,255,0.15)';
        rrFill(ex+ew-18+i*7,rowY+1,4,7,1.5);
      }
    }
  }
  const frac=clamp(pl.energy/100,0,1), low=pl.energy<25;
  ctx.fillStyle='rgba(5,9,15,0.75)'; rrFill(ex-2,ey-2,ew+4,13,5);
  let c1,c2;
  if(pl.out){ c1='#2a2f36'; c2='#1a1e24'; }
  else if(low){ const fl=Math.floor(perf*6)%2; c1=fl?'#ff5050':'#a01818'; c2=fl?'#c02020':'#701010'; }
  else if(frac>0.5){ c1='#6fe86f'; c2='#2f9f3f'; }
  else{ c1='#ffd24a'; c2='#c09020'; }
  const gr=ctx.createLinearGradient(0,ey,0,ey+9);
  gr.addColorStop(0,c1); gr.addColorStop(1,c2);
  ctx.fillStyle=gr;
  if(!pl.out&&frac>0.02) rrFill(ex,ey,ew*frac,9,4);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; rrPath(ctx,ex-2,ey-2,ew+4,13,5); ctx.stroke();
  if(pl.superT>0&&!pl.out){
    ctx.fillStyle='#ffb050'; rrFill(ex,ey-6,ew*(pl.superT/8),3,1.5);
  }
}
function drawTouchUI(){
  if(!touchMode||state!=='play') return;
  ctx.globalAlpha=0.4;
  for(const j of [joy,aimJoy]){
    if(!j) continue;
    ctx.strokeStyle=j===aimJoy?'#ffb050':'#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(j.ox,j.oy,26,0,TAU); ctx.stroke();
    ctx.fillStyle=j===aimJoy?'#ffb050':'#fff';
    ctx.beginPath(); ctx.arc(j.ox+j.dx,j.oy+j.dy,12,0,TAU); ctx.fill();
  }
  if(!paused){
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(PAUSE_BTN.x,PAUSE_BTN.y,PAUSE_BTN.r,0,TAU); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.fillRect(PAUSE_BTN.x-4,PAUSE_BTN.y-5,3,10);

  ctx.globalAlpha=1;
}

function drawEntry(){
  ctx.fillStyle='rgba(2,4,10,0.78)'; ctx.fillRect(0,0,W,H);
  bigText('NEW BEST SCORE!',100,20,'#ffd24a','yellow');
  bigText(String(score),136,15,'#fff');
  ctx.font='700 9px '+FONT; ctx.fillStyle='#8f98a3'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('ENTER YOUR NAME',W/2,162);
  for(let i=0;i<3;i++){
    const cx=ESLOT(i), sel=entry.slot===i;
    // up/down arrows
    ctx.fillStyle=sel?'#ffd24a':'#3a424c';
    ctx.beginPath(); ctx.moveTo(cx,178); ctx.lineTo(cx-8,192); ctx.lineTo(cx+8,192); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx,282); ctx.lineTo(cx-8,268); ctx.lineTo(cx+8,268); ctx.closePath(); ctx.fill();
    // slot box
    ctx.fillStyle=sel?'rgba(255,140,26,0.18)':'rgba(255,255,255,0.06)';
    rrFill(cx-17,204,34,50,6);
    ctx.strokeStyle=sel?'#ff9a2a':'rgba(255,255,255,0.2)';
    ctx.lineWidth=sel?1.8:1;
    rrPath(ctx,cx-17,204,34,50,6); ctx.stroke();
    if(sel) glow(cx,229,60,'orange',0.2);
    ctx.font='800 26px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=sel?'#fff':'#c3ccd6';
    ctx.fillText(ECHARS[entry.ch[i]],cx,230);
  }
  ctx.textBaseline='top';
  // OK button
  const ok=entry.slot===2;
  ctx.fillStyle='rgba(80,255,170,0.14)';
  rrFill(W/2-50,300,100,28,7);
  ctx.strokeStyle=ok?'#50ffaa':'rgba(255,255,255,0.25)';
  rrPath(ctx,W/2-50,300,100,28,7); ctx.stroke();
  ctx.font='800 12px '+FONT; ctx.textAlign='center';
  ctx.fillStyle=ok?'#9fffcf':'#c3ccd6';
  ctx.fillText('OK',W/2,308);
  ctx.font='600 8px '+FONT; ctx.fillStyle='#7a828c';
  ctx.fillText(touchMode?'TAP ARROWS TO CHANGE · TAP OK':'TYPE OR ARROWS · ENTER = NEXT',W/2,344);
}

function draw(){
  ctx.save();
  if(shake>0&&SET.shake) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  if(state==='title'){ drawTitle(); ctx.restore(); return; }

  drawBG();

  // warn about chasm columns about to scroll in from the top
  if(state==='play'&&!boss){
    const baseRow=Math.floor(dst/TS);
    for(let c=0;c<COLS;c++){
      if(tileAt(baseRow+16,c)!=='pit'&&(tileAt(baseRow+17,c)==='pit'||tileAt(baseRow+18,c)==='pit')){
        const a2=0.45+0.35*Math.sin(perf*9);
        glow(c*TS+16,28,26,'red',a2*0.5);
        ctx.save(); ctx.globalAlpha=a2;
        ctx.fillStyle='#ffd24a';
        ctx.beginPath();
        ctx.moveTo(c*TS+16,23); ctx.lineTo(c*TS+9,34); ctx.lineTo(c*TS+23,34);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#1a1206';
        ctx.fillRect(c*TS+15,26,2,4); ctx.fillRect(c*TS+15,31.4,2,1.6);
        ctx.restore();
      }
    }
  }

  // Dredger flood overlay
  if(flood>0.02){
    ctx.fillStyle='rgba(14,53,64,'+(0.5*flood)+')';
    ctx.fillRect(0,150,W,H-150);
    if(flood>0.9){
      const T4=TILESETS[AREA_PAL[area]];
      for(const isle of ISLES){
        ctx.drawImage(T4.plate,isle[0]-36,isle[1]-44,72,88);
        ctx.strokeStyle='rgba(255,255,255,0.25)';
        rrPath(ctx,isle[0]-36,isle[1]-44,72,88,4); ctx.stroke();
      }
    }
    ctx.fillStyle='rgba(160,230,255,'+(0.10*flood)+')';
    for(let i=0;i<5;i++){
      const sy=(perf*12+i*67)%(H-160)+155;
      ctx.fillRect(20+(i*61)%260,sy,40,1.5);
    }
    if(ventT>0){ // bilge current arrows
      ctx.globalAlpha=0.5;
      ctx.fillStyle='#bfe9ff';
      for(let i=0;i<6;i++){
        const ax=(((perf*90*ventPush)%(W+40))+(W+40))%(W+40)-20;
        ctx.fillRect((ax+i*55)%(W+40)-20,H*0.55+((i*53)%120),14,2);
      }
      ctx.globalAlpha=1;
    }
  }
  // depth-charge landing markers
  for(const l of lobs){
    const q=l.t/l.dur;
    ctx.save(); ctx.globalAlpha=0.85;
    ctx.strokeStyle=Math.floor(perf*8)%2?'#ff6a4a':'#ffd24a'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(l.tx,l.ty,16,0,TAU); ctx.stroke();
    ctx.fillStyle='rgba(255,106,74,0.30)';
    ctx.beginPath(); ctx.moveTo(l.tx,l.ty);
    ctx.arc(l.tx,l.ty,16,-Math.PI/2,-Math.PI/2+q*TAU); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // rising barrier ghosts (Warden)
  if(tempWalls.length){
    const off2=dst%TS, baseRow2=Math.floor(dst/TS);
    const T5=TILESETS[AREA_PAL[area]];
    for(const w of tempWalls){
      if(w.t>=0.5) continue;
      const yy=(baseRow2+16-w.wr)*TS+off2;
      ctx.save(); ctx.globalAlpha=0.3+0.3*Math.sin(perf*14);
      ctx.drawImage(T5.wall,w.c*TS,yy,TS,TS);
      ctx.restore();
      glow(w.c*TS+16,yy+16,26,'red',0.4);
    }
  }

  for(const p of pickups){
    const cols={E:['green','#52e07a','#1d7a3a'],W:['orange','#ffb050','#c05c0a'],
      B:['blue','#8cc0ff','#2a5aa8'],S:['yellow','#ffe27a','#c09a20'],
      P:['magenta','#ff8adf','#a0308a'],F:['red','#ff9070','#b03020'],
      A:['cyan','#9fe1ff','#2a6a9a']}[p.kind];
    const bob=Math.sin(p.t*4)*2.2;
    const pu=0.6+0.4*Math.sin(p.t*6);
    glow(p.x,p.y+bob,52,cols[0],0.45*pu+0.3);
    ctx.save(); ctx.translate(p.x,p.y+bob);
    // rotating beacon ring
    ctx.save(); ctx.rotate(p.t*1.6);
    ctx.strokeStyle=cols[1]; ctx.lineWidth=1.6;
    ctx.globalAlpha=0.5+0.3*pu;
    ctx.setLineDash([6,7]);
    ctx.beginPath(); ctx.arc(0,0,15.5,0,TAU); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='rgba(8,12,18,0.92)'; rrFill(-11,-11,22,22,5);
    const gr=ctx.createLinearGradient(0,-11,0,11);
    gr.addColorStop(0,cols[1]); gr.addColorStop(1,cols[2]);
    ctx.strokeStyle=gr; ctx.lineWidth=2.4;
    rrPath(ctx,-11,-11,22,22,5); ctx.stroke();
    ctx.fillStyle=cols[1]; ctx.font='800 14px '+FONT;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.kind,0,1);
    ctx.restore();
  }
  ctx.textBaseline='top';

  for(const e of enemies) drawEnemy(e);
  if(boss) drawBoss();
  for(const pl of players()) drawPlayer(pl);

  // depth charges in flight
  for(const l of lobs){
    const q=l.t/l.dur;
    const gx=l.x+(l.tx-l.x)*q, gy=l.y+(l.ty-l.y)*q;
    const sy=gy-Math.sin(q*Math.PI)*80;
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(gx,gy,4,2.4,0,0,TAU); ctx.fill();
    ctx.fillStyle='#2a3138';
    ctx.beginPath(); ctx.arc(gx,sy,4.4,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(gx-1.3,sy-1.3,1.5,0,TAU); ctx.fill();
    glow(gx,sy,10,'orange',0.4);
  }

  for(const b of pbul){
    if(b.flame){ // solid-cored fire, not mist
      const q=b.life/0.5, fs=b.sz||1;
      const r=(4.5+(1-q)*9)*fs;
      const fg2=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
      fg2.addColorStop(0,'rgba(255,250,215,'+(0.9*q+0.1).toFixed(3)+')');
      fg2.addColorStop(0.45,'rgba(255,168,58,'+(0.85*q).toFixed(3)+')');
      fg2.addColorStop(1,'rgba(205,60,10,0)');
      ctx.fillStyle=fg2;
      ctx.beginPath(); ctx.arc(b.x,b.y,r,0,TAU); ctx.fill();
      glow(b.x,b.y,(30-13*q)*fs,'orange',0.4+0.35*q);
      continue;
    }
    const ang=Math.atan2(b.dy,b.dx);
    const s=b.sz||1;
    const TC=[null,
      ['yellow','rgba(255,214,90,0.35)','rgba(255,236,160,0.9)'],
      ['orange','rgba(255,160,70,0.35)','rgba(255,205,150,0.9)'],
      ['green','rgba(110,255,150,0.35)','rgba(195,255,205,0.9)'],
      ['cyan','rgba(120,210,255,0.35)','rgba(195,235,255,0.9)'],
      ['magenta','rgba(255,120,220,0.35)','rgba(255,195,240,0.9)']][b.pc||1];
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(ang); ctx.scale(s,s);
    ctx.fillStyle=TC[1]; rrFill(-17,-1.8,13,3.6,1.8);
    ctx.fillStyle=TC[2]; rrFill(-7,-2.6,14,5.2,2.6);
    ctx.fillStyle='#fff'; rrFill(-5,-1.6,11,3.2,1.6);
    ctx.restore();
    glow(b.x,b.y,24*s,TC[0],0.75);
  }
  for(const b of ebul){
    if(SET.hivis){ // high-visibility: bigger white core with dark outline
      glow(b.x,b.y,24,'red',0.9);
      ctx.fillStyle='#20060a';
      ctx.beginPath(); ctx.arc(b.x,b.y,4.4,0,TAU); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(b.x,b.y,3.2,0,TAU); ctx.fill();
    }else{
      glow(b.x-b.dx*0.035,b.y-b.dy*0.035,12,'red',0.35);
      glow(b.x,b.y,20,'red',0.85);
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(b.x,b.y,2.4,0,TAU); ctx.fill();
    }
  }

  for(const p of parts){
    const q=1-p.t/p.dur;
    if(p.kind==='smoke'){
      ctx.globalAlpha=q*0.22;
      ctx.fillStyle='#9299a3';
      ctx.beginPath(); ctx.arc(p.x,p.y,(p.r||5)+(1-q)*11,0,TAU); ctx.fill();
    }else if(p.kind==='ember'){
      glow(p.x,p.y,7,'orange',q*0.9);
    }else{
      ctx.globalAlpha=q;
      ctx.strokeStyle=p.c||'#ffd080'; ctx.lineWidth=1.4;
      ctx.beginPath();
      ctx.moveTo(p.x-p.dx*0.035,p.y-p.dy*0.035);
      ctx.lineTo(p.x,p.y); ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
  for(const f of fx){
    const q=f.t/f.dur, R=f.big?52:24;
    ctx.save();
    ctx.globalAlpha=(1-q)*0.75;
    ctx.strokeStyle='#ffd9a0'; ctx.lineWidth=2.5*(1-q)+0.5;
    ctx.beginPath(); ctx.arc(f.x,f.y,R*Math.pow(q,0.4)*1.5,0,TAU); ctx.stroke();
    ctx.restore();
    const r=R*Math.pow(q,0.5);
    const gr=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,Math.max(1,r));
    gr.addColorStop(0,'rgba(255,246,208,'+(1-q)+')');
    gr.addColorStop(0.45,'rgba(255,150,50,'+(1-q)*0.9+')');
    gr.addColorStop(1,'rgba(120,30,10,0)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(f.x,f.y,Math.max(1,r),0,TAU); ctx.fill();
    glow(f.x,f.y,r*3,'orange',(1-q)*0.55);
  }

  if(flash>0){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const fg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,H*0.7);
    fg.addColorStop(0,'rgba(255,255,255,'+flash*0.9+')');
    fg.addColorStop(0.6,'rgba(200,220,255,'+flash*0.5+')');
    fg.addColorStop(1,'rgba(140,180,255,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
    ctx.restore();
    ctx.save(); ctx.globalAlpha=flash*0.8;
    ctx.strokeStyle='#cfe4ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(W/2,H/2,(1-flash)*H*0.75,0,TAU); ctx.stroke();
    ctx.restore();
  }

  if(area===3&&(state==='play'||state==='clear')){
    renderDarkness();
    ctx.drawImage(darkCvs,0,0,W,H);
  }
  ctx.drawImage(vignetteSpr,0,0,W,H);
  if(state==='play'&&players().some(p=>p.alive&&p.energy<25)){
    const a2=0.10+0.08*Math.sin(perf*10);
    const rg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.68);
    rg.addColorStop(0,'rgba(255,40,40,0)');
    rg.addColorStop(1,'rgba(255,40,40,'+a2+')');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }

  drawHUD();
  drawTouchUI();

  if(state==='clear'&&tally){
    const n=tally.lines.length, done=tally.shown>=n;
    const ph=62+n*19+(done?28:6);
    ctx.fillStyle='rgba(4,8,14,0.80)'; rrFill(36,146,W-72,ph,9);
    ctx.strokeStyle='rgba(111,232,111,0.35)';
    rrPath(ctx,36,146,W-72,ph,9); ctx.stroke();
    bigText('AREA '+area+' CLEAR!',156,20,'#6fe86f','green');
    ctx.font='700 10px '+FONT; ctx.textBaseline='top';
    let sum=0;
    for(let i=0;i<tally.shown;i++){
      const L=tally.lines[i]; sum+=L[1];
      const yy=196+i*19;
      const fresh=i===tally.shown-1&&tally.t<0.16&&!done;
      ctx.globalAlpha=fresh?Math.max(0.2,tally.t/0.16):1;
      ctx.textAlign='left'; ctx.fillStyle='#c3ccd6'; ctx.fillText(L[0],52,yy);
      ctx.textAlign='right'; ctx.fillStyle=L[1]>0?'#ffd24a':'#5a626c';
      ctx.fillText(String(L[1]),W-52,yy);
      ctx.globalAlpha=1;
    }
    if(done){
      const yy=196+n*19+8;
      ctx.font='800 12px '+FONT;
      ctx.textAlign='left'; ctx.fillStyle='#6fe86f'; ctx.fillText('TOTAL',52,yy);
      ctx.textAlign='right'; ctx.fillText('+'+sum,W-52,yy);
    }
  }
  if(state==='entry') drawEntry();
  if(state==='over'){
    ctx.fillStyle='rgba(2,4,10,0.72)'; ctx.fillRect(0,0,W,H);
    bigText('GAME OVER',104,26,'#ff5060','red');
    bigText('SCORE '+score,146,14,'#fff');
    // run stats
    ctx.fillStyle='rgba(8,14,22,0.6)'; rrFill(70,176,W-140,76,7);
    ctx.strokeStyle='rgba(140,212,255,0.2)'; rrPath(ctx,70,176,W-140,76,7); ctx.stroke();
    const acc=ST.shots?Math.min(99,Math.round(100*ST.hits/ST.shots)):0;
    const stats=[['KILLS',ST.kills],['ACCURACY',acc+'%'],['AREAS CLEARED',ST.areas],
      ['BEST CHAIN','×'+ST.chain],['BOMBS USED',ST.bombs]];
    ctx.font='700 8.5px '+FONT; ctx.textBaseline='top';
    stats.forEach((s,i)=>{
      const y=182+i*13.5;
      ctx.textAlign='left'; ctx.fillStyle='#8f98a3'; ctx.fillText(s[0],82,y);
      ctx.textAlign='right'; ctx.fillStyle='#e6ebf0'; ctx.fillText(String(s[1]),W-82,y);
    });
    ctx.font='800 9px '+FONT; ctx.fillStyle='#8fd4ff'; ctx.textAlign='center';
    ctx.fillText('—  BEST  —',W/2,262);
    SCORES.forEach((s,i)=>{
      const y=277+i*14;
      ctx.font='700 10px '+FONT;
      ctx.textAlign='left'; ctx.fillStyle=i===0?'#ffd24a':'#9aa3ad';
      ctx.fillText((i+1)+'  '+s.n,98,y);
      ctx.textAlign='right'; ctx.fillStyle=i===0?'#fff':'#c3ccd6';
      ctx.fillText(String(s.s),206,y);
      ctx.fillStyle='#5a626c'; ctx.fillText(s.m,224,y);
    });
    if(Math.floor(perf*2)%2) bigText(touchMode?'TAP FOR TITLE':'ENTER FOR TITLE',356,12,'#8fd4ff');
  }
  if(paused&&state==='play'){
    ctx.fillStyle='rgba(2,4,10,0.7)'; ctx.fillRect(0,0,W,H);
    bigText('PAUSED',180,24,'#fff','cyan');
    ['RESUME','QUIT TO TITLE'].forEach((t,i)=>{
      const y=i===0?PMENU.y0:PMENU.y1, sel=pauseSel===i;
      ctx.fillStyle=sel?'rgba(255,140,26,0.22)':'rgba(255,255,255,0.06)';
      rrFill(PMENU.x,y,PMENU.w,PMENU.h,7);
      ctx.strokeStyle=sel?'#ff9a2a':'rgba(255,255,255,0.25)';
      ctx.lineWidth=sel?1.6:1;
      rrPath(ctx,PMENU.x,y,PMENU.w,PMENU.h,7); ctx.stroke();
      if(sel) glow(W/2,y+PMENU.h/2,PMENU.w*1.15,'orange',0.15);
      ctx.font='800 11px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=sel?'#ffd24a':'#c3ccd6';
      ctx.fillText(t,W/2,y+PMENU.h/2);
    });
    ctx.textBaseline='top'; ctx.font='600 8px '+FONT;
    ctx.fillStyle='#7a828c'; ctx.textAlign='center';
    ctx.fillText(touchMode?'TAP AN OPTION':'UP/DOWN SELECT — FIRE/ENTER OK — Q QUIT',W/2,PMENU.y1+40);
  }
  ctx.restore();
}

//------------------------------------------------- main loop
let last=0, acc=0, perf=0;
const STEP=1/60;
function frame(ts){
  requestAnimationFrame(frame);
  const t=ts/1000;
  let dt=Math.min(0.1,t-last); last=t; perf=t;
  acc+=dt;
  while(acc>=STEP){ update(STEP); acc-=STEP; }
  ctx.setTransform(RS,0,0,RS,0,0);
  draw();
}
requestAnimationFrame(ts=>{ last=ts/1000; requestAnimationFrame(frame); });

// PWA
if('serviceWorker' in navigator&&location.protocol.indexOf('http')===0)
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
