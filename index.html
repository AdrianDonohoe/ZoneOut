<script>
'use strict';
//==============================================================
// ZONE OUT — an original top-down run-and-gun homage.
// All art, sound and level design generated in code.
//==============================================================
const W=320, H=480;
const cvs=document.getElementById('g');
const ctx=cvs.getContext('2d');

let RS=2; // backing-store render scale (dpr-aware)
function resize(){
  const s=Math.min(innerWidth/W, innerHeight/H);
  cvs.style.width=(W*s)+'px';
  cvs.style.height=(H*s)+'px';
  RS=Math.max(1,Math.min(3,s*(devicePixelRatio||1)));
  cvs.width=Math.round(W*RS); cvs.height=Math.round(H*RS);
}
addEventListener('resize',resize);
addEventListener('orientationchange',()=>setTimeout(resize,100));
resize();

//------------------------------------------------- utils
const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
function hash(n){ n=Math.imul(n^61,0x27d4eb2d); n^=n>>>15; n=Math.imul(n,0x2c1b3c6d); n^=n>>>12; return (n>>>0)/4294967296; }
function rrPath(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);
  g.arcTo(x,y,x+w,y,r);
  g.closePath();
}
function rrFill(x,y,w,h,r){ rrPath(ctx,x,y,w,h,r); ctx.fill(); }
function buzz(p){ if(SET.rumble&&navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

//------------------------------------------------- settings & scores
const SET=Object.assign({diff:'normal',aim:'classic',mus:2,sfx:3,shake:1,rumble:1,hivis:0,players:1},
  JSON.parse(localStorage.getItem('zoneout_set')||'{}'));
function saveSet(){ localStorage.setItem('zoneout_set',JSON.stringify(SET)); applyVol(); }
const VOLS=[0,0.35,0.7,1], VOLN=['OFF','LOW','MED','HIGH'];

let SCORES=JSON.parse(localStorage.getItem('zoneout_scores')||'[]');
if(!SCORES.length){
  const old=+(localStorage.getItem('zoneout_hi')||0);
  if(old>0) SCORES=[{n:'AAA',s:old,m:'A'}];
}
function topScore(){ return SCORES.length?SCORES[0].s:0; }
function scoreQualifies(s){ return s>0&&(SCORES.length<5||s>SCORES[SCORES.length-1].s); }
function saveScores(){ localStorage.setItem('zoneout_scores',JSON.stringify(SCORES)); }

//------------------------------------------------- prerendered art
function mkC(w,h,fn){
  const c=document.createElement('canvas');
  c.width=w*2; c.height=h*2;
  const g=c.getContext('2d');
  g.scale(2,2); fn(g,w,h);
  return c;
}
function radial(g,x,y,r,stops){
  const gr=g.createRadialGradient(x,y,0,x,y,r);
  for(const s of stops) gr.addColorStop(s[0],s[1]);
  return gr;
}
const GLOWC={};
{
  const cols={yellow:'255,214,90', red:'255,84,100', green:'80,255,170',
    blue:'106,176,255', orange:'255,146,52', magenta:'255,84,204',
    cyan:'140,220,255', white:'255,255,255'};
  for(const k in cols){
    const c=cols[k];
    GLOWC[k]=mkC(64,64,g=>{
      g.fillStyle=radial(g,32,32,32,[[0,'rgba('+c+',0.85)'],[0.35,'rgba('+c+',0.30)'],[1,'rgba('+c+',0)']]);
      g.fillRect(0,0,64,64);
    });
  }
}
function glow(x,y,size,name,alpha){
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=Math.min(1,alpha);
  ctx.drawImage(GLOWC[name],x-size/2,y-size/2,size,size);
  ctx.restore();
}

const TS=32;
// two area palettes: 1 = green metal, 2 = rust belt
const PALS=[
  {b0:'#2b3634',b1:'#232d2c',b2:'#1c2524',plate0:'#3c4a44',plate1:'#242e2b',
   rivet:'#59695f',vent:'90,200,230',ventGlow:'cyan',haz0:'#4d4a20',haz1:'#211f0e',
   wall0:'#55685c',wall1:'#31403a',wallF:'#151d19',
   water0:'#173c46',water1:'#0d2129',waterHi:'rgba(140,220,255,0.12)',
   pit0:'#0a0d10',pit1:'#04060a',conv0:'#20262c',convStripe:'rgba(140,220,255,0.4)'},
  {b0:'#3d2f22',b1:'#33261b',b2:'#291d13',plate0:'#54402c',plate1:'#33261a',
   rivet:'#7a6248',vent:'255,150,60',ventGlow:'orange',haz0:'#4d3020',haz1:'#1f130c',
   wall0:'#7a5c38',wall1:'#4a3620',wallF:'#1d1204',
   water0:'#3a4416',water1:'#1c230a',waterHi:'rgba(190,255,120,0.12)',
   pit0:'#100a08',pit1:'#060302',conv0:'#2c241c',convStripe:'rgba(255,170,80,0.4)'},
  {b0:'#242c3e',b1:'#1d2434',b2:'#161c2a',plate0:'#32405a',plate1:'#1e2738',
   rivet:'#4e5f80',vent:'190,120,255',ventGlow:'magenta',haz0:'#3a3a56',haz1:'#16162a',
   wall0:'#4a5878',wall1:'#2a3450',wallF:'#0c1020',
   water0:'#12283e',water1:'#081422',waterHi:'rgba(120,180,255,0.12)',
   pit0:'#07090f',pit1:'#020307',conv0:'#1c2230',convStripe:'rgba(150,190,255,0.4)'},
  {b0:'#28343e',b1:'#202a34',b2:'#19212a',plate0:'#38495a',plate1:'#232e3a',
   rivet:'#5a7288',vent:'120,200,255',ventGlow:'blue',haz0:'#3a4a24',haz1:'#161e10',
   wall0:'#4e6478',wall1:'#2c3c4c',wallF:'#0e161e',
   water0:'#0e3540',water1:'#071d26',waterHi:'rgba(140,230,255,0.14)',
   pit0:'#060a0e',pit1:'#020507',conv0:'#1e262e',convStripe:'rgba(140,210,255,0.4)'},
  {b0:'#4a3d26',b1:'#3e321e',b2:'#312716',plate0:'#5e4c2e',plate1:'#39301c',
   rivet:'#8a744e',vent:'255,210,110',ventGlow:'yellow',haz0:'#4d3a20',haz1:'#1f170c',
   wall0:'#7c6640',wall1:'#4a3c24',wallF:'#1c1408',
   water0:'#37391a',water1:'#1a1c0c',waterHi:'rgba(220,230,140,0.12)',
   pit0:'#0e0a06',pit1:'#050302',conv0:'#2a241a',convStripe:'rgba(255,214,120,0.4)'},
  {b0:'#333a46',b1:'#282e3a',b2:'#1e2430',plate0:'#465064',plate1:'#2a3140',
   rivet:'#68748c',vent:'255,110,110',ventGlow:'red',haz0:'#4d4d20',haz1:'#1f1f0e',
   wall0:'#5a6478',wall1:'#343c4e',wallF:'#12161e',
   water0:'#16222c',water1:'#0a1218',waterHi:'rgba(150,200,255,0.10)',
   pit0:'#07080c',pit1:'#020305',conv0:'#20242e',convStripe:'rgba(255,150,150,0.35)'}
];
function mkTileset(pal){
  function base(g,seed){
    const gr=g.createLinearGradient(0,0,TS,TS);
    gr.addColorStop(0,pal.b0); gr.addColorStop(0.55,pal.b1); gr.addColorStop(1,pal.b2);
    g.fillStyle=gr; g.fillRect(0,0,TS,TS);
    g.strokeStyle='rgba(0,0,0,0.45)'; g.strokeRect(0.5,0.5,TS-1,TS-1);
    g.strokeStyle='rgba(255,255,255,0.045)'; g.strokeRect(1.5,1.5,TS-3,TS-3);
    for(let i=0;i<7;i++){
      const x=hash(seed*31+i)*TS, y=hash(seed*77+i)*TS;
      g.fillStyle=hash(seed*13+i)<0.5?'rgba(0,0,0,0.20)':'rgba(255,255,255,0.05)';
      g.fillRect(x,y,1.6,1.6);
    }
    g.strokeStyle='rgba(0,0,0,0.10)'; g.lineWidth=1;
    for(let i=0;i<2;i++){
      const sx=hash(seed*57+i)*TS*0.7, sy=hash(seed*91+i)*TS*0.8+4;
      g.beginPath(); g.moveTo(sx,sy); g.lineTo(sx+7+hash(seed*3+i)*9,sy+3); g.stroke();
    }
    g.fillStyle='rgba(255,255,255,0.03)';
    g.fillRect(1,1,TS-2,2);
  }
  const t={tiles:[],ventGlow:pal.ventGlow};
  for(let v=0;v<4;v++) t.tiles.push(mkC(TS,TS,g=>base(g,v+1)));
  t.plate=mkC(TS,TS,g=>{
    base(g,9);
    const gr=g.createLinearGradient(3,3,TS-3,TS-3);
    gr.addColorStop(0,pal.plate0); gr.addColorStop(1,pal.plate1);
    g.fillStyle=gr; rrPath(g,3,3,TS-6,TS-6,3); g.fill();
    g.strokeStyle='rgba(255,255,255,0.08)'; rrPath(g,3,3,TS-6,TS-6,3); g.stroke();
    g.fillStyle=pal.rivet;
    for(const p of [[6,6],[TS-9,6],[6,TS-9],[TS-9,TS-9]]){
      g.beginPath(); g.arc(p[0]+1.5,p[1]+1.5,1.6,0,TAU); g.fill();
    }
  });
  t.vent=mkC(TS,TS,g=>{
    base(g,17);
    g.fillStyle='#0d1110'; rrPath(g,5,7,TS-10,TS-14,2); g.fill();
    for(let i=0;i<3;i++){
      g.fillStyle='rgba('+pal.vent+',0.75)';
      g.fillRect(8,10+i*5,TS-16,1.6);
      g.fillStyle='rgba('+pal.vent+',0.18)';
      g.fillRect(8,9+i*5,TS-16,3.6);
    }
  });
  t.crater=mkC(TS,TS,g=>{
    base(g,23);
    g.fillStyle=radial(g,16,16,10,[[0,'#0c100e'],[0.7,'#141a17'],[1,'rgba(20,26,23,0)']]);
    g.beginPath(); g.arc(16,16,10,0,TAU); g.fill();
    g.strokeStyle='rgba(255,255,255,0.07)';
    g.beginPath(); g.arc(16,17.5,9,Math.PI*1.1,Math.PI*1.9); g.stroke();
  });
  t.wall=mkC(TS,TS,g=>{
    g.fillStyle='rgba(0,0,0,0.45)'; g.fillRect(0,TS-3,TS,3);
    const gf=g.createLinearGradient(0,TS-11,0,TS-2);
    gf.addColorStop(0,pal.wallF); gf.addColorStop(1,'#000');
    g.fillStyle=gf; g.fillRect(1,TS-11,TS-2,9);
    const gt=g.createLinearGradient(0,0,TS,TS-11);
    gt.addColorStop(0,pal.wall0); gt.addColorStop(1,pal.wall1);
    g.fillStyle=gt; g.fillRect(1,1,TS-2,TS-12);
    g.strokeStyle='rgba(255,255,255,0.12)'; g.strokeRect(1.5,1.5,TS-3,TS-13);
    g.fillStyle='rgba(255,255,255,0.17)'; g.fillRect(1,1,TS-2,3.5); g.fillRect(1,1,3.5,TS-12);
    g.fillStyle='rgba(0,0,0,0.24)'; g.fillRect(TS-4.5,4,3.5,TS-16);
    g.strokeStyle='rgba(0,0,0,0.6)'; g.lineWidth=1.5; g.strokeRect(0.75,0.75,TS-1.5,TS-1.5);
    g.fillStyle='rgba(255,255,255,0.18)';
    g.fillRect(5,5,2,2); g.fillRect(TS-7,5,2,2);
    g.fillRect(5,TS-17,2,2); g.fillRect(TS-7,TS-17,2,2);
  });
  t.pit=mkC(TS,TS,g=>{
    const gp=g.createLinearGradient(0,0,0,TS);
    gp.addColorStop(0,pal.pit0); gp.addColorStop(1,pal.pit1);
    g.fillStyle=gp; g.fillRect(0,0,TS,TS);
    g.fillStyle='rgba(255,255,255,0.025)';
    for(let i=0;i<4;i++) g.fillRect(hash(i*31+5)*TS,hash(i*77+9)*TS,1.5,1.5);
  });
  t.bridge=mkC(TS,TS,g=>{
    g.fillStyle=pal.pit1; g.fillRect(0,0,TS,TS);
    const gb=g.createLinearGradient(0,0,TS,0);
    gb.addColorStop(0,pal.plate1); gb.addColorStop(0.5,pal.plate0); gb.addColorStop(1,pal.plate1);
    g.fillStyle=gb; g.fillRect(2.5,0,TS-5,TS);
    g.strokeStyle='rgba(0,0,0,0.4)';
    for(let i=0;i<4;i++){ g.beginPath(); g.moveTo(2.5,i*8+4.5); g.lineTo(TS-2.5,i*8+4.5); g.stroke(); }
    g.fillStyle=pal.rivet; g.fillRect(0,0,2.5,TS); g.fillRect(TS-2.5,0,2.5,TS);
  });
  t.conv=mkC(TS,TS,g=>{
    g.fillStyle=pal.conv0; g.fillRect(0,0,TS,TS);
    g.fillStyle='rgba(0,0,0,0.4)'; g.fillRect(0,0,TS,2.5); g.fillRect(0,TS-2.5,TS,2.5);
    g.fillStyle='rgba(255,255,255,0.10)'; g.fillRect(0,2.5,TS,1); g.fillRect(0,TS-3.5,TS,1);
  });
  t.water=mkC(TS,TS,g=>{
    const gw=g.createLinearGradient(0,0,0,TS);
    gw.addColorStop(0,pal.water0); gw.addColorStop(1,pal.water1);
    g.fillStyle=gw; g.fillRect(0,0,TS,TS);
    g.fillStyle='rgba(0,0,0,0.15)';
    g.fillRect(hash(3)*TS*0.6,hash(7)*TS*0.6,10,4);
  });
  t.pipes=mkC(TS,TS,g=>{ // service pipe run
    base(g,29);
    for(const py of [9,22]){
      const pg=g.createLinearGradient(0,py-4,0,py+4);
      pg.addColorStop(0,pal.plate0); pg.addColorStop(0.45,pal.rivet); pg.addColorStop(1,pal.plate1);
      g.fillStyle=pg; g.fillRect(0,py-4,TS,8);
      g.fillStyle='rgba(0,0,0,0.30)'; g.fillRect(0,py+2,TS,2);
      g.fillStyle='rgba(255,255,255,0.16)'; g.fillRect(0,py-3,TS,1.4);
      g.fillStyle=pal.plate1; g.fillRect(13,py-5,6,10);
      g.fillStyle='rgba(255,255,255,0.12)'; g.fillRect(13,py-5,6,1.5);
      g.fillStyle='rgba(0,0,0,0.3)'; g.fillRect(13,py+3.5,6,1.5);
    }
  });
  t.grate=mkC(TS,TS,g=>{ // floor grate
    base(g,31);
    g.fillStyle='rgba(0,0,0,0.5)'; rrPath(g,4,4,TS-8,TS-8,2); g.fill();
    for(let gy=0;gy<3;gy++)for(let gx=0;gx<3;gx++){
      g.fillStyle='#04070a';
      g.fillRect(6.5+gx*7.5,6.5+gy*7.5,5.5,5.5);
      g.fillStyle='rgba(255,255,255,0.07)';
      g.fillRect(6.5+gx*7.5,6.5+gy*7.5,5.5,1);
    }
    g.strokeStyle='rgba(255,255,255,0.10)'; rrPath(g,4,4,TS-8,TS-8,2); g.stroke();
  });
  t.chev=mkC(TS,TS,g=>{ // painted chevron (drawn over base)
    g.strokeStyle='rgba(216,184,48,0.45)'; g.lineWidth=3.2;
    g.beginPath(); g.moveTo(7,22); g.lineTo(16,11); g.lineTo(25,22); g.stroke();
    g.strokeStyle='rgba(0,0,0,0.25)'; g.lineWidth=1;
    g.beginPath(); g.moveTo(7,24); g.lineTo(16,13); g.lineTo(25,24); g.stroke();
  });
  t.sten=mkC(TS,TS,g=>{ // faded stencil marking
    g.strokeStyle='rgba(255,255,255,0.13)'; g.lineWidth=2;
    g.strokeRect(7.5,9.5,17,13);
    g.beginPath(); g.moveTo(7.5,16); g.lineTo(24.5,16); g.stroke();
    g.fillStyle='rgba(255,255,255,0.10)';
    g.fillRect(10,12,4,2); g.fillRect(18,18,4,2);
  });
  t.raft=mkC(36,128,g=>{ // sliding platform over chasms
    const gr=g.createLinearGradient(0,0,36,0);
    gr.addColorStop(0,pal.plate1); gr.addColorStop(0.5,pal.plate0); gr.addColorStop(1,pal.plate1);
    g.fillStyle=gr; g.fillRect(3,2,30,124);
    g.strokeStyle='rgba(0,0,0,0.4)';
    for(let i=1;i<13;i++){ g.beginPath(); g.moveTo(3,2+i*9.5); g.lineTo(33,2+i*9.5); g.stroke(); }
    g.fillStyle=pal.rivet; g.fillRect(0,0,3,128); g.fillRect(33,0,3,128);
    for(const yy of [2,120]){ // hazard-striped ends
      for(let x=4;x<32;x+=8){
        g.fillStyle='#d8b830'; g.fillRect(x,yy,4,4);
        g.fillStyle='rgba(0,0,0,0.6)'; g.fillRect(x+4,yy,4,4);
      }
    }
  });
  t.convStripe=pal.convStripe; t.waterHi=pal.waterHi;
  t.haz0=pal.haz0; t.haz1=pal.haz1;
  return t;
}
const TILESETS=PALS.map(mkTileset);
// area -> tileset (area 7, the final assault, reuses the night palette)
const AREA_PAL=[0,0,1,2,3,4,5,2];
const ALEN=[0,2600,2800,3000,3000,3200,3200,1600];
const endBi=a=>Math.floor(ALEN[a]/(TS*BAND));

//------------------------------------------------- terrain layout
// world rows group into 8-row bands; each band rolls a terrain type.
// bands 0-1 (start) and 10+ (boss arena) are always safe ground.
const BAND=8, COLS=W/TS;
function tileAt(wr,c){
  if(c<0||c>=COLS||wr<0) return 'ground';
  if(tempWalls.length){ // Warden's raised barriers
    for(const w of tempWalls) if(w.wr===wr&&w.c===c&&w.t>=0.5) return 'wall';
  }
  const bi=Math.floor(wr/BAND), br=wr-bi*BAND;
  if(bi<2||bi>=endBi(area)) return 'ground';
  // deal band types from a fixed variety deck so every area has every terrain,
  // rotated by area+loop so each run's layout differs
  const ORDER=['open','chasm','belt','barrier','flood','open','chasm','belt'];
  const rot=(Math.floor(hash(area*977)*8)+loop)%8;
  const bt=ORDER[(bi-2+rot)%8];
  if(bt==='open'){ // open ground: large structures force route choices
    if(hash(bi*271+area*31)>0.42){
      const shape=Math.floor(hash(bi*577+area)*3);
      if(shape===0){ // central monolith — pick a side
        if(br>=2&&br<=4&&c>=3&&c<=6) return 'wall';
      }else if(shape===1){ // twin flanks — thread the middle
        if(br>=2&&br<=4&&(c<=2||c>=7)) return 'wall';
      }else{ // staggered blocks — slalom through
        if(br>=1&&br<=2&&c>=1&&c<=3) return 'wall';
        if(br>=4&&br<=5&&c>=6&&c<=8) return 'wall';
      }
    }
    return hash(wr*211+c*17+area*5)>0.978?'wall':'ground';
  }
  if(bt==='chasm'){ // crossed by bridges
    if(br>=2&&br<=5){
      const b1=1+Math.floor(hash(bi*997+area)*7);
      const b2=hash(bi*613+area)>0.45?((b1+4)%8+1):-9;
      if(c===b1||c===b1+1||c===b2||c===b2+1) return 'bridge';
      return 'pit';
    }
    return 'ground';
  }
  if(bt==='belt'){ // conveyor belts
    if(br>=2&&br<=5) return hash(bi*389+area)>0.5?'convR':'convL';
    return 'ground';
  }
  if(bt==='barrier'){ // wall line with gaps, plus crates
    if(br===3){
      const g1=1+Math.floor(hash(bi*761+area)*7);
      if(Math.abs(c-g1)<=1) return 'ground';
      if(c===(g1+5)%9) return 'ground';
      return 'wall';
    }
    if(br===6) return hash(wr*211+c*17+area*5)>0.965?'wall':'ground';
    return 'ground';
  }
  if(br>=1&&br<=6) return 'water'; // flooded section
  return 'ground';
}
const ISLES=[[70,300],[250,300]]; // dry ground during the Dredger's flood
const inIsle=(x,y)=>ISLES.some(i=>Math.abs(x-i[0])<36&&Math.abs(y-i[1])<44);
function tileTypeAt(x,y){
  const off=dst%TS, baseRow=Math.floor(dst/TS), rows=Math.ceil(H/TS)+1;
  const ry=Math.floor((y-off)/TS);
  let t=tileAt(baseRow+rows-ry,Math.floor(x/TS));
  if(flood>0.9&&t==='ground'&&y>150&&!inIsle(x,y)) t='water';
  return t;
}
function cellAt(x,y){
  const off=dst%TS, baseRow=Math.floor(dst/TS);
  return {c:Math.floor(x/TS), wr:baseRow+16-Math.floor((y-off)/TS)};
}
const solidAt=(x,y)=>tileTypeAt(x,y)==='wall';
function safeSpawnX(off){
  off=off||0;
  for(const dx of [0,-32,32,-64,64,-96,96,-128,128]){
    const x=clamp(W/2+off+dx,10,W-10);
    const t=tileTypeAt(x,H-90);
    if(t!=='pit'&&t!=='wall') return x;
  }

//------------------------------------------------- audio
// Synth engine v2: layered drums, fat dual-osc bass, vibrato leads with echo,
// detuned pads, one original track per area group, musical bar-boundary
// transitions and sidechain-style ducking on big hits.
let AC=null,gMus=null,gSfx=null,noiseBuf=null,muted=false;
function applyVol(){
  if(gMus) gMus.gain.value=0.5*VOLS[SET.mus];
  if(gSfx) gSfx.gain.value=0.65*VOLS[SET.sfx];
}
function audioInit(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    gMus=AC.createGain(); gMus.connect(AC.destination);
    gSfx=AC.createGain(); gSfx.connect(AC.destination);
    applyVol();
    noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    musicStart();
  }catch(e){ AC=null; }
}
// ---- low-level voices (all take an absolute AudioContext time)
function vOsc(dest,type,f0,f1,vol,when,dur,att){
  if(!AC||muted) return null;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(Math.max(1,f0),when);
  if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),when+dur);
  g.gain.setValueAtTime(0.0001,when);
  g.gain.linearRampToValueAtTime(vol,when+(att||0.004));
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  o.connect(g); g.connect(dest);
  o.start(when); o.stop(when+dur+0.05);
  return o;
}
function vNz(dest,vol,when,dur,fType,fHz0,fHz1,q){
  if(!AC||muted) return;
  const s=AC.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
  s.playbackRate.value=0.7+Math.random()*0.6;
  const f=AC.createBiquadFilter(); f.type=fType||'lowpass'; f.Q.value=q||0.8;
  f.frequency.setValueAtTime(fHz0||2000,when);
  if(fHz1) f.frequency.exponentialRampToValueAtTime(Math.max(30,fHz1),when+dur);
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,when);
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  s.connect(f); f.connect(g); g.connect(dest);
  s.start(when); s.stop(when+dur+0.05);
}
function duck(depth,rel){ // momentary music dip under big impacts
  if(!AC||!gMus) return;
  const v=0.5*VOLS[SET.mus], t=AC.currentTime;
  gMus.gain.cancelScheduledValues(t);
  gMus.gain.setValueAtTime(v*depth,t);
  gMus.gain.linearRampToValueAtTime(v,t+rel);
}
const N2F=n=>440*Math.pow(2,(n-69)/12);
// ---- drums
function kick(t,vol){
  vOsc(gMus,'sine',115,36,vol,t,0.16);
  vNz(gMus,vol*0.4,t,0.02,'highpass',900);
}
function snare(t,vol){
  vNz(gMus,vol,t,0.13,'bandpass',1900,900,1.1);
  vOsc(gMus,'triangle',195,130,vol*0.7,t,0.07);
}
function hat(t,vol,open){
  vNz(gMus,vol,t,open?0.16:0.045,'highpass',6200);
}
// ---- pitched channels
function bassN(n,t,dur){
  if(!AC||muted) return;
  const f=N2F(n);
  const flt=AC.createBiquadFilter();
  flt.type='lowpass'; flt.Q.value=2;
  flt.frequency.setValueAtTime(1100,t);
  flt.frequency.exponentialRampToValueAtTime(320,t+dur);
  flt.connect(gMus);
  vOsc(flt,'sawtooth',f,f,0.14,t,dur);
  vOsc(gMus,'square',f/2,f/2,0.10,t,dur);
}
function leadN(n,t,dur,vol,wave){
  const o=vOsc(gMus,wave||'square',N2F(n),N2F(n),vol,t,dur,0.012);
  if(o){ // gentle vibrato
    const lfo=AC.createOscillator(), lg=AC.createGain();
    lfo.frequency.value=5.6; lg.gain.value=7;
    lfo.connect(lg); lg.connect(o.detune);
    lfo.start(t+dur*0.3); lfo.stop(t+dur+0.05);
  }
}
function arpN(n,t,dur,vol){ vOsc(gMus,'triangle',N2F(n),N2F(n),vol||0.024,t,dur); }
function padChord(notes,t,dur){
  for(const n of notes){
    vOsc(gMus,'triangle',N2F(n),N2F(n),0.014,t,dur,0.5);
    const o2=vOsc(gMus,'triangle',N2F(n),N2F(n),0.012,t,dur,0.5);
    if(o2) o2.detune.value=8;
  }
}

let curSong='title', pendingSong=null, musTimer=null, musStep=0, musNext=0;
function setSong(s){
  if(s&&SONGS[s]&&s!==curSong&&s!==pendingSong) pendingSong=s;
}
function playStep(S,i,t,spb){
  if(S.k&&S.k[i]) kick(t,0.46);
  if(S.s&&S.s[i]) snare(t,S.sVol||0.22);
  if(S.h&&S.h[i]) hat(t,S.h[i]===2?0.10:(S.hVol||0.06),S.h[i]===2);
  if(S.bass&&S.bass[i]) bassN(S.bass[i],t,spb*1.9);
  const leadOK=S.leadAlways||state==='play'||state==='clear';
  if(S.lead&&S.lead[i]&&leadOK){
    leadN(S.lead[i],t,spb*2.6,S.leadVol||0.046,S.leadWave);
    leadN(S.lead[i],t+spb*3,spb*2.0,(S.leadVol||0.046)*0.3,S.leadWave); // echo tap
  }
  if(S.arp&&S.arp[i]&&leadOK) arpN(S.arp[i],t,spb*0.95);
  if(S.pad&&i%8===0) padChord(S.pad[(i>>3)%S.pad.length],t,spb*8.6);
}
function musicStart(){
  if(!AC||musTimer) return;
  musNext=AC.currentTime+0.1;
  musTimer=setInterval(()=>{
    if(!AC||muted) return;
    while(musNext<AC.currentTime+0.25){
      if(pendingSong&&musStep%16===0){ // switch on the bar line
        curSong=pendingSong; pendingSong=null; musStep=0;
      }
      const S=SONGS[curSong], spb=60/S.bpm/4;
      playStep(S,musStep&31,musNext,spb);
      musNext+=spb; musStep++;
    }
  },60);
}
function songForNow(){
  if(state==='title'||state==='over'||state==='entry') return 'title';
  if(boss&&boss.ready) return boss.kind===7?'final':'boss';
  return [0,'stage1','stage2','night','docks','stage2','night','final'][area];
}

// ------- name entry
const ECHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.- ';
let entry=null; // {ch:[i,i,i], slot}
function entryCyc(d){
  entry.ch[entry.slot]=(entry.ch[entry.slot]+d+ECHARS.length)%ECHARS.length;
  sfx.blip();
}
function entryConfirm(){
  if(entry.slot<2){ entry.slot++; sfx.blip(); }
  else entryDone();
}
function entryDone(){
  const n=entry.ch.map(i=>ECHARS[i]).join('');
  SCORES.push({n,s:score,m:SET.diff==='arcade'?'A':'N'});
  SCORES.sort((a,b)=>b.s-a.s);
  SCORES=SCORES.slice(0,5);
  saveScores();
  entry=null; state='over'; sfx.extend();
}
function entryKey(e){
  const c=e.code;
  if(c==='ArrowUp'||c==='KeyW') entryCyc(1);
  else if(c==='ArrowDown'||c==='KeyS') entryCyc(-1);
  else if(c==='ArrowLeft') entry.slot=Math.max(0,entry.slot-1);
  else if(c==='ArrowRight') entry.slot=Math.min(2,entry.slot+1);
  else if(c==='Backspace') entry.slot=Math.max(0,entry.slot-1);
  else if(['Enter','KeyZ','KeyJ','Space'].includes(c)) entryConfirm();
  else if(e.key&&e.key.length===1){
    const i=ECHARS.indexOf(e.key.toUpperCase());
    if(i>=0){ entry.ch[entry.slot]=i; if(entry.slot<2) entry.slot++; else entryDone(); }
  }
}
const ESLOT=i=>W/2+(i-1)*44;
function entryTouch(p){
  for(let i=0;i<3;i++){
    const cx=ESLOT(i);
    if(Math.abs(p.x-cx)<20){
      if(p.y>170&&p.y<200){ entry.slot=i; entryCyc(1); return; }
      if(p.y>258&&p.y<290){ entry.slot=i; entryCyc(-1); return; }
      if(p.y>=200&&p.y<=258){ entry.slot=i; return; }
    }
  }
  if(Math.abs(p.x-W/2)<50&&p.y>300&&p.y<330) entryDone();
}

// gamepads: left stick / d-pad move, right stick twin-aim, A/RT fire, B/X bomb, Start pause.
// 1P: first pad assists keyboard. 2P: P2 gets the last pad; P1 gets pad 0 only when two pads exist.
let padPrevA={bomb:false,start:false,up:false,down:false,left:false,right:false,a:false};
let padPrevB={bomb:false,start:false,up:false,down:false,left:false,right:false,a:false};
const input2={mx:0,my:0,ax:0,ay:0,fire:false,bomb:false};
function parsePad(gp,prev){
  if(!gp){ for(const k in prev) prev[k]=false; return null; }
  const btn=i=>!!(gp.buttons[i]&&gp.buttons[i].pressed);
  let mx=gp.axes[0]||0, my=gp.axes[1]||0;
  if(Math.hypot(mx,my)<0.25){ mx=0; my=0; }
  if(btn(14)) mx-=1; if(btn(15)) mx+=1;
  if(btn(12)) my-=1; if(btn(13)) my+=1;
  const m=Math.hypot(mx,my);
  if(m>1){ mx/=m; my/=m; }
  const bomb=btn(1)||btn(2), start=btn(9);
  const up=btn(12)||my<-0.5, down=btn(13)||my>0.5;
  const left=btn(14)||mx<-0.5, right=btn(15)||mx>0.5;
  const a=btn(0);
  const out={mx,my,rsx:gp.axes[2]||0,rsy:gp.axes[3]||0,fire:btn(0)||btn(7),
    bombEdge:bomb&&!prev.bomb, startEdge:start&&!prev.start,
    upEdge:up&&!prev.up, downEdge:down&&!prev.down,
    lEdge:left&&!prev.left, rEdge:right&&!prev.right, aEdge:a&&!prev.a};
  prev.bomb=bomb; prev.start=start; prev.up=up; prev.down=down;
  prev.left=left; prev.right=right; prev.a=a;
  return out;
}
function padMenuRoute(pad){
  if(!pad) return;
  if(pad.startEdge){
    if(state==='play'){ paused=!paused; pauseSel=0; }
    else if(state==='title') startGame();
    else if(state==='entry') entryConfirm();
    else if(state==='over') state='title';
  }
  if(state==='play'&&paused){
    if(pad.upEdge||pad.downEdge){ pauseSel^=1; sfx.blip(); }
    if(pad.aEdge){ if(pauseSel===0) paused=false; else quitToTitle(); }
  }else if(state==='title'){
    if(pad.upEdge){ titleSel=(titleSel+TM.rows-1)%TM.rows; sfx.blip(); }
    if(pad.downEdge){ titleSel=(titleSel+1)%TM.rows; sfx.blip(); }
    if(pad.lEdge&&titleSel>0) titleAct(titleSel,-1);
    if(pad.rEdge&&titleSel>0) titleAct(titleSel,1);
    if(pad.aEdge) titleAct(titleSel,1);
  }else if(state==='entry'){
    if(pad.upEdge) entryCyc(1);
    if(pad.downEdge) entryCyc(-1);
    if(pad.lEdge) entry.slot=Math.max(0,entry.slot-1);
    if(pad.rEdge) entry.slot=Math.min(2,entry.slot+1);
    if(pad.aEdge) entryConfirm();
  }else if(state==='over'&&pad.aEdge) state='title';
}
function readInput(){
  const twin=SET.aim==='twin';
  const padsAll=[];
  const raw=navigator.getGamepads?navigator.getGamepads():[];
  for(const p of raw) if(p&&p.connected) padsAll.push(p);
  let gpA=null,gpB=null;
  if(P2){
    gpB=padsAll[padsAll.length-1]||null;
    gpA=padsAll.length>=2?padsAll[0]:null;
  }else gpA=padsAll[0]||null;
  const padA=parsePad(gpA,padPrevA);
  const padB=parsePad(gpB,padPrevB);
  padMenuRoute(padA); padMenuRoute(padB);
  // ---- player 1: keyboard + touch + padA
  let mx=0,my=0,ax=0,ay=0;
  if(keys.KeyA) mx-=1; if(keys.KeyD) mx+=1;
  if(keys.KeyW) my-=1; if(keys.KeyS) my+=1;
  if(twin){
    if(keys.ArrowLeft) ax-=1; if(keys.ArrowRight) ax+=1;
    if(keys.ArrowUp) ay-=1; if(keys.ArrowDown) ay+=1;
  }else{
    if(keys.ArrowLeft) mx-=1; if(keys.ArrowRight) mx+=1;
    if(keys.ArrowUp) my-=1; if(keys.ArrowDown) my+=1;
  }
  if(joy){ mx=joy.dx/26; my=joy.dy/26; if(Math.hypot(mx,my)<0.25){mx=0;my=0;} }
  else if(mx||my){ const m=Math.hypot(mx,my); mx/=m; my/=m; }
  let fire=!!(keys.KeyZ||keys.KeyJ||keys.Space||fireTouch!==null);
  if(twin&&aimJoy){
    const m=Math.hypot(aimJoy.dx,aimJoy.dy);
    if(m>7){ ax=aimJoy.dx/m; ay=aimJoy.dy/m; }
    fire=true;
  }
  if(padA){
    if(!mx&&!my&&(padA.mx||padA.my)){ mx=padA.mx; my=padA.my; }
    if(twin){
      const rm=Math.hypot(padA.rsx,padA.rsy);
      if(rm>0.35){ ax=padA.rsx/rm; ay=padA.rsy/rm; }
    }
    fire=fire||padA.fire;
    if(state==='play'&&!paused&&padA.bombEdge) input.bomb=true;
  }
  if(ax||ay){ const m=Math.hypot(ax,ay); ax/=m; ay/=m; }
  if(twin&&(ax||ay)) fire=true; // twin-stick: aiming fires
  input.mx=mx; input.my=my; input.ax=ax; input.ay=ay; input.fire=fire;
  // ---- player 2: its own pad
  if(P2&&padB){
    let ax2=0,ay2=0,f2=padB.fire;
    if(twin){
      const rm=Math.hypot(padB.rsx,padB.rsy);
      if(rm>0.35){ ax2=padB.rsx/rm; ay2=padB.rsy/rm; f2=true; }
    }
    input2.mx=padB.mx; input2.my=padB.my;
    input2.ax=ax2; input2.ay=ay2; input2.fire=f2;
    if(state==='play'&&!paused&&padB.bombEdge) input2.bomb=true;
  }else{
    input2.mx=input2.my=input2.ax=input2.ay=0; input2.fire=false;
  }
}

// terrain-aware setpieces: read the band deck and garrison it.
// (band math mirrors tileAt — keep the two in sync)
function bandInfo(bi){
  const ORDER=['open','chasm','belt','barrier','flood','open','chasm','belt'];
  const rot=(Math.floor(hash(area*977)*8)+loop)%8;
  return ORDER[(bi-2+rot)%8];
}
const rowD=wr=>(wr-17)*TS; // distance at which world row wr spawns at the top edge
function buildPlats(){
  plats=[];
  for(let bi=2;bi<endBi(area);bi++) if(bandInfo(bi)==='chasm'){
    const pl={r0:bi*BAND, x0:80+hash(bi*533+area)*(W-160), range:50+hash(bi*77+area)*26,
      sp:0.9+hash(bi*91+area)*0.7, ph:hash(bi*13+area)*TAU, x:0, px:0};
    pl.x=pl.px=clamp(pl.x0+Math.sin(pl.ph)*pl.range,26,W-26);
    plats.push(pl);
  }
}
function platScreenY(pl){ // screen y of the raft's top (spans the 4 pit rows)
  const off=dst%TS, baseRow=Math.floor(dst/TS);
  return (baseRow+16-(pl.r0+5))*TS+off;
}
function platAt(x,y){
  for(const pl of plats){
    const yT=platScreenY(pl);
    if(y>=yT&&y<=yT+4*TS&&Math.abs(x-pl.x)<=20) return pl;
  }
  return null;
}
function terrainEvents(){
  const ev=[];
  for(let bi=2;bi<endBi(area);bi++){
    const bt=bandInfo(bi), r0=bi*BAND;
    if(bt==='chasm'){ // a keeper on each bridge, crossers behind it
      for(let c=0;c<COLS;c++){
        if(tileAt(r0+3,c)==='bridge'&&tileAt(r0+3,c-1)!=='bridge'){
          const x=c*TS+TS, d=rowD(r0+3);
          if(d>100){
            ev.push({d,f:()=>spawnE('turret',x)});
            ev.push({d:d+110,f:()=>spawnE('grunt',x)});
            ev.push({d:d+145,f:()=>spawnE('grunt',x)});
          }
        }
      }
    }else if(bt==='barrier'){ // gap ambush: turret covers one gap, grunts pour from the other
      const g1=1+Math.floor(hash(bi*761+area)*7), g2=(g1+5)%9;
      const d=rowD(r0+5);
      if(d>100){
        ev.push({d,f:()=>spawnE('turret',g1*TS+16)});
        ev.push({d:d+25,f:()=>spawnE('grunt',g2*TS+16)});
        ev.push({d:d+60,f:()=>spawnE('grunt',g2*TS+16)});
      }
    }else if(bt==='belt'){ // armor drifting on the rollers
      const d=rowD(r0+3);
      if(d>100){
        ev.push({d,f:()=>spawnE('tank',80+hash(bi*31+area)*160)});
        ev.push({d:d+55,f:()=>spawnE('grunt',60)});
        ev.push({d:d+55,f:()=>spawnE('grunt',W-60)});
      }
    }else if(bt==='flood'){ // mines lurking in the shallows, a walker wading through
      const d=rowD(r0+2);
      if(d>100){
        for(let i=0;i<3;i++)
          ev.push({d:d+i*45,f:()=>spawnE('mine',50+hash(bi*77+i*13+area)*(W-100))});
        ev.push({d:d+85,f:()=>spawnE('shield',W/2)});
      }
    }
  }
  return ev;
}

// Warden barrier helpers
function raiseWall(wr,c,life){
  if(c<0||c>=COLS) return;
  for(const pl of players()){ // never seal a cell someone is standing beside
    const pc=cellAt(pl.x,pl.y);
    if(Math.abs(pc.c-c)<=1&&Math.abs(pc.wr-wr)<=1) return;
  }
  if(tileAt(wr,c)!=='ground') return;
  if(tempWalls.some(w=>w.wr===wr&&w.c===c)) return;
  tempWalls.push({wr,c,t:0,life:life||5.5});
}
function ringWalls(tp){
  const pc=cellAt(tp.x,tp.y);
  let n=0;
  for(let dc=-2;dc<=2;dc++) for(let dr=-2;dr<=2;dr++){
    if(Math.max(Math.abs(dc),Math.abs(dr))!==2) continue;
    if(hash((boss.t*97|0)+dc*31+dr*17)<0.28) continue; // leave escape gaps
    raiseWall(pc.wr+dr,pc.c+dc,5.5);
    if(++n>=11) return;
  }
}
function lineWalls(){
  const row=cellAt(W/2,214).wr;
  const g1=1+Math.floor(hash(boss.t*811|0)*7), g2=(g1+4)%9;
  for(let c=0;c<COLS;c++){
    if(c===g1||c===g2) continue;
    raiseWall(row,c,4);
  }
}
function bossTouch(x,y){
  if(!boss||!boss.ready) return false;
  if(boss.kind===103){
    for(const tw of boss.twins)
      if(!tw.dead&&dist2(x,y,tw.x,tw.y)<22*22) return true;
    return false;
  }
  if(boss.kind>=100){
    for(const ox of [-58,0,58])
      if(dist2(x,y,boss.x+ox,boss.y)<27*27) return true;
    return false;
  }
  if(boss.kind===5){
    if(boss.hidden) return false;
    for(const s of boss.segs)
      if(s&&dist2(x,y,s.x,s.y)<16*16) return true;
    return false;
  }
  if(boss.kind===4||boss.kind===7){
    for(const ox of [-52,0,52])
      if(dist2(x,y,boss.x+ox,boss.y+4)<30*30) return true;
    return false;
  }
  return dist2(x,y,boss.x,boss.y+8)<62*62;
}

function killEnemy(e){
  e.dead=true;
  chain++; chainT=1.5;
  bestChain=Math.max(bestChain,chain);
  ST.kills++; ST.chain=Math.max(ST.chain,chain);
  const pt=Math.round((EPTS[e.type]||100)*chainMult()/10)*10;
  addScore(pt); popup(e.x,e.y,'+'+pt);
  boomFx(e.x,e.y,e.type==='tank');

}
function playerHit(pl){
  if(!pl.alive||pl.invuln>0) return;
  if(pl.shield>0){
    pl.shield--; pl.invuln=1.2; shake=5;
    sfx.shield(); buzz(60);
    boomFx(pl.x,pl.y,false);
    msg(pl.shield>0?'SHIELD -1':'SHIELD DOWN!',1);
  }else playerDie(pl);
}
function useBomb(pl){
  if(pl.bombs<=0||!pl.alive) return;
  pl.bombs--; ST.bombs++; sfx.bomb(); buzz(80);
  flash=0.6; shake=9; bombSuppress=1.6;
  ebul.length=0;
  for(const e of enemies){
    e.hp-=12;
    if(e.hp<=0) killEnemy(e);
  }
  enemies=enemies.filter(e=>!e.dead);
  if(boss&&boss.ready){
    if(boss.kind===103){
      for(const tw of boss.twins) if(!tw.dead){
        tw.hp-=12;
        if(tw.hp<=0){ tw.dead=true; boomFx(tw.x,tw.y,true); sfx.bigBoom(); addScore(1500); popup(tw.x,tw.y,'+1500'); }
      }
      boss.flash=0.2;
    }else if(!(boss.kind===5&&boss.hidden)){ // can't bomb the burrowed wyrm
      boss.hp-=25; boss.flash=0.2;
      for(const pod of boss.pods) if(pod.hp>0) pod.hp-=15;
    }
  }
  lobs=[];
  bombQ=[];
  for(let i=0;i<6;i++)
    bombQ.push({x:30+Math.random()*(W-60),y:60+Math.random()*(H-170),d:0.06+i*0.09});
}

//------------------------------------------------- weapons
function fireWeapon(pl){
  const fx0=pl.lockFx, fy0=pl.lockFy;
  const n0=pbul.length;
  if(pl.superT>0){ // SUPER BURNER — piercing flame stream
    const base=Math.atan2(fy0,fx0);
    for(let i=0;i<2;i++){
      const a=base+(Math.random()-0.5)*0.26;
      const sp=210+Math.random()*80;
      pbul.push({x:pl.x+fx0*10,y:pl.y+fy0*10,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,
        dmg:1.4,pierce:true,flame:true,life:0.5,hitIds:[],sz:1.25+(pl.power-1)*0.25});
    }
    pl.fireT=0.05;
    if(Math.random()<0.35) sfx.flame();
    ST.shots+=pbul.length-n0;
    return;
  }
  const sz=1+(pl.power-1)*0.28; // purely visual growth
  if(pl.weapon===0){ // twin shot: max 3 projectiles; power scales damage/size/rate
    const px=-fy0, py=fx0;
    const dmg=[0,2,2,2.5,3,3.5][pl.power];
    for(const o of [-3,3])
      pbul.push({x:pl.x+px*o+fx0*8,y:pl.y+py*o+fy0*8,dx:fx0*330,dy:fy0*330,dmg,sz,pc:pl.power});
    if(pl.power>=2)
      pbul.push({x:pl.x+fx0*12,y:pl.y+fy0*12,dx:fx0*345,dy:fy0*345,dmg,sz,pc:pl.power});
    pl.fireT=[0,0.12,0.12,0.11,0.10,0.09][pl.power]; sfx.shoot();
  }else{ // 3-way spread — 11, 12 and 1 o'clock
    const dmg=1.5+0.5*pl.power;
    const base=Math.atan2(fy0,fx0);
    for(const o of [-0.42,0,0.42]) // ±24°
      pbul.push({x:pl.x+fx0*8,y:pl.y+fy0*8,dx:Math.cos(base+o)*310,dy:Math.sin(base+o)*310,dmg,sz,pc:pl.power});
    pl.fireT=[0,0.22,0.19,0.16,0.14,0.12][pl.power]; sfx.eight();
  }
  ST.shots+=pbul.length-n0;
}

//------------------------------------------------- update
function updatePlayerFor(pl,inp,dt){
  if(!pl.alive){
    pl.fellT=Math.max(0,pl.fellT-dt);
    if(pl.out) return;
    pl.deadT-=dt;
    if(pl.deadT<=0){
      if(pl.lives<0){ pl.out=true; }
      else{
        pl.alive=true; pl.x=safeSpawnX(pl.pi?32:-32); pl.y=H-90; pl.fellT=0; pl.pitT=0;
        pl.energy=75; pl.invuln=2.5; pl.spawnT=0.6;
        pl.bombs=SET.diff==='normal'?3:2;
        pl.shield=SET.diff==='normal'?3:0;
        pl.power=Math.max(1,pl.power-1); pl.superT=0;
        pl.fx=0;pl.fy=-1;pl.lockFx=0;pl.lockFy=-1;
        ebul.length=0;
      }
    }
    return;
  }
  if(pl.spawnT>0.2){ // beam-in: locked briefly
    pl.spawnT-=dt;
    pl.invuln=Math.max(pl.invuln,0.5);
    return;
  }
  pl.spawnT=Math.max(0,pl.spawnT-dt);
  const here=tileTypeAt(pl.x,pl.y);
  const spd=112*(here==='water'?0.62:1); // wading slows you
  const nx=clamp(pl.x+inp.mx*spd*dt,10,W-10);
  if(!solidAt(nx+Math.sign(inp.mx)*5,pl.y)) pl.x=nx;
  const ny=clamp(pl.y+inp.my*spd*dt,30,H-14);
  if(!solidAt(pl.x,ny+Math.sign(inp.my)*5)) pl.y=ny;
  pl.moving=!!(inp.mx||inp.my);
  // conveyor belts push
  const tt=tileTypeAt(pl.x,pl.y);
  if(tt==='convL'||tt==='convR'){
    const px2=clamp(pl.x+(tt==='convR'?44:-44)*dt,10,W-10);
    if(!solidAt(px2,pl.y)) pl.x=px2;
  }
  // bilge current shove (Dredger vents)
  if(ventT>0&&pl.y>H*0.42){
    const px3=clamp(pl.x+ventPush*40*dt,10,W-10);
    if(!solidAt(px3,pl.y)) pl.x=px3;
  }
  // wall scrolled onto player: shoved down; crushed at the bottom edge
  if(solidAt(pl.x,pl.y)){
    let tries=0;
    while(solidAt(pl.x,pl.y)&&pl.y<H-14&&tries++<40) pl.y+=1;
    if(solidAt(pl.x,pl.y)){ playerDie(pl); return; }
  }
  // riding a sliding platform — carried with it
  const pl0=platAt(pl.x,pl.y);
  if(pl0&&tileTypeAt(pl.x,pl.y)==='pit') pl.x=clamp(pl.x+(pl0.x-pl0.px),10,W-10);
  // missing ground — brief teeter grace, then fall
  if(pl.spawnT<=0&&tileTypeAt(pl.x,pl.y)==='pit'&&!platAt(pl.x,pl.y)){
    pl.pitT+=dt;
    if(pl.pitT>0.12){ playerFall(pl); return; }
  }else pl.pitT=0;
  if(inp.mx||inp.my){
    pl.fx=inp.mx; pl.fy=inp.my;
    const m=Math.hypot(pl.fx,pl.fy); pl.fx/=m; pl.fy/=m;
    pl.walk+=dt*10;
  }
  const aiming=SET.aim==='twin'&&(inp.ax||inp.ay);
  if(aiming){ pl.lockFx=inp.ax; pl.lockFy=inp.ay; }
  else{
    // classic: facing locks while firing (strafe)
    if(inp.fire&&!pl.firing){ pl.lockFx=pl.fx; pl.lockFy=pl.fy; }
    if(!inp.fire){ pl.lockFx=pl.fx; pl.lockFy=pl.fy; }
  }
  pl.firing=inp.fire;
  pl.fireT-=dt;
  if(inp.fire&&pl.fireT<=0) fireWeapon(pl);
  if(inp.fire&&pl.superT>0) pl.superT=Math.max(0,pl.superT-dt);
  if(inp.bomb){ useBomb(pl); }
  pl.invuln=Math.max(0,pl.invuln-dt);
  pl.energy-=DRAIN*drainK()*dt;
  if(pl.energy<25){
    warnTimer-=dt;
    if(warnTimer<=0){ sfx.warn(); warnTimer=0.9; }
  }
  if(pl.energy<=0){ pl.energy=0; playerDie(pl); }
}
function checkAllOut(){
  if((state==='play'||state==='clear')&&players().every(p=>p.out)){
    sfx.gameover();
    if(scoreQualifies(score)){ entry={ch:[0,0,0],slot:0}; state='entry'; }
    else state='over';
  }
}

function diffScale(){ return 1+0.22*(loop-1)+(area===2?0.12:0); }

function updateEnemies(dt){
  const k=diffScale()*(alarmT>0?1.3:1); // spotted: everything fires faster
  for(const e of enemies){
    e.t+=dt;
    switch(e.type){
      case 'grunt':{
        e.y+=scrollSpd*dt; // ride the ground
        if(walkable(e.x,e.y+10)) e.y+=30*dt*(tileTypeAt(e.x,e.y)==='water'?0.6:1);
        const tp=nearestP(e.x,e.y);
        let tx=clamp(tp.x-e.x,-1,1)*16*dt;
        if(tx&&!walkable(e.x+Math.sign(tx)*8,e.y)) tx=0;
        if(!walkable(e.x,e.y+10)){ // hazard ahead: slide along it to a crossing
          if(!e.steer) e.steer=hash(e.id*13)>0.5?1:-1;
          if(e.x<=14) e.steer=1; else if(e.x>=W-14) e.steer=-1;
          if(!walkable(e.x+e.steer*8,e.y)) e.steer=-e.steer;
          tx=e.steer*34*dt;
        }
        e.x=clamp(e.x+tx,10,W-10);
        e.ft-=dt;
        if(e.ft<=0&&e.y>0&&e.y<H-130&&bombSuppress<=0&&anyAlive()
           &&!lineBlocked(e.x,e.y,tp.x,tp.y)){
          eShoot(e.x,e.y,aimAng(e.x,e.y),95*k);
          e.ft=1.9/k+Math.random()*0.6;
        }
        break;
      }
      case 'turret':{
        e.y+=scrollSpd*dt;
        e.ft-=dt;
        const tp=nearestP(e.x,e.y);
        if(e.ft<=0&&e.y>10&&e.y<H-90&&bombSuppress<=0&&anyAlive()
           &&!lineBlocked(e.x,e.y,tp.x,tp.y)){
          const a=aimAng(e.x,e.y);
          eShoot(e.x,e.y,a,120*k);
          eShoot(e.x,e.y,a,120*k*0.8);
          e.ft=2.2/k;
        }
        break;
      }
      case 'drone':{
        e.y+=74*dt;
        e.x=e.x0+Math.sin(e.t*3)*38;
        const tp=nearestP(e.x,e.y);
        if(!e.fired&&e.y>tp.y-150&&bombSuppress<=0&&anyAlive()){
          e.fired=true;
          eShoot(e.x,e.y,aimAng(e.x,e.y),110*k);
          if(loop>1||area===2) eShoot(e.x,e.y,aimAng(e.x,e.y)+0.35,110*k);
        }
        break;
      }
      case 'tank':{
        e.y+=scrollSpd*dt;
        if(walkable(e.x,e.y+13)) e.y+=11*dt*(tileTypeAt(e.x,e.y)==='water'?0.6:1);
        else{ // heavy treads swing slowly toward a crossing
          if(!e.steer) e.steer=hash(e.id*17)>0.5?1:-1;
          if(e.x<=16) e.steer=1; else if(e.x>=W-16) e.steer=-1;
          if(!walkable(e.x+e.steer*10,e.y)) e.steer=-e.steer;
          e.x=clamp(e.x+e.steer*18*dt,12,W-12);
        }
        e.ft-=dt;
        const tp=nearestP(e.x,e.y);
        if(e.ft<=0&&e.y>6&&e.y<H-100&&bombSuppress<=0&&anyAlive()
           &&!lineBlocked(e.x,e.y,tp.x,tp.y)){
          const a=aimAng(e.x,e.y);
          for(const o of [-0.3,0,0.3]) eShoot(e.x,e.y,a+o,105*k);
          e.ft=2.6/k;
        }
        break;
      }
      case 'spotter':{ // searchlight drone — caught in the beam raises the alarm
        e.y+=30*dt;
        e.x=e.x0+Math.sin(e.t*1.1)*46;
        e.dir+=dt*0.85;
        if(anyAlive()&&e.y>0){
          let seen=false;
          for(const tp of players()){
            if(!tp.alive) continue;
            const dx=tp.x-e.x, dy=tp.y-e.y;
            if(Math.hypot(dx,dy)<150){
              let da=Math.atan2(dy,dx)-e.dir;
              da=Math.atan2(Math.sin(da),Math.cos(da));
              if(Math.abs(da)<0.33){ seen=true; break; }
            }
          }
          if(seen) e.alarm+=dt;
          else e.alarm=Math.max(0,e.alarm-dt*2);
          if(e.alarm>0.45){
            e.alarm=0; alarmT=3; sfx.warn();
            if(bombSuppress<=0)
              for(let i=-1;i<=1;i++) eShoot(e.x,e.y,aimAng(e.x,e.y)+i*0.2,120*k);
          }
        }
        break;
      }
      case 'mine':
        e.y+=scrollSpd*dt;
        if(e.phase===0){
          for(const tp of players()){
            if(tp.alive&&e.y>0&&Math.abs(tp.x-e.x)<70&&tp.y-e.y<130&&tp.y>e.y){ e.phase=1; break; }
          }
        }else{
          e.arm-=dt;
          if(e.arm<=0){
            e.dead=true; boomFx(e.x,e.y,false); sfx.boom();
            if(bombSuppress<=0)
              for(let i=0;i<8;i++) eShoot(e.x,e.y,i*TAU/8+0.4,85*k);
          }
        }
        break;
      case 'shield':{
        e.y+=scrollSpd*dt;
        if(walkable(e.x,e.y+10)) e.y+=16*dt*(tileTypeAt(e.x,e.y)==='water'?0.6:1);
        const tp=nearestP(e.x,e.y);
        let tx=clamp(tp.x-e.x,-1,1)*10*dt;
        if(tx&&!walkable(e.x+Math.sign(tx)*8,e.y)) tx=0;
        if(!walkable(e.x,e.y+10)){
          if(!e.steer) e.steer=hash(e.id*19)>0.5?1:-1;
          if(e.x<=14) e.steer=1; else if(e.x>=W-14) e.steer=-1;
          if(!walkable(e.x+e.steer*8,e.y)) e.steer=-e.steer;
          tx=e.steer*28*dt;
        }
        e.x=clamp(e.x+tx,10,W-10);
        e.shieldOff=Math.max(0,e.shieldOff-dt);
        e.ft-=dt;
        if(e.ft<=0&&e.y>0&&e.y<H-120&&bombSuppress<=0&&anyAlive()
           &&!lineBlocked(e.x,e.y,tp.x,tp.y)){
          const a=aimAng(e.x,e.y);
          eShoot(e.x,e.y,a-0.12,100*k);
          eShoot(e.x,e.y,a+0.12,100*k);
          e.shieldOff=0.9; // shield drops after firing — attack window
          e.ft=2.4/k;
        }
        break;
      }
    }
    // ground units ride conveyor belts
    if(!e.dead&&!FLIES[e.type]&&e.y>0){
      const ttE=tileTypeAt(e.x,e.y);
      if(ttE==='convL') e.x=clamp(e.x-30*dt,12,W-12);
      else if(ttE==='convR') e.x=clamp(e.x+30*dt,12,W-12);
    }
    // ground units tumble into chasms (no score — the pit did the work)
    if(!e.dead&&!FLIES[e.type]&&e.y>0&&tileTypeAt(e.x,e.y)==='pit'&&!platAt(e.x,e.y)){
      e.dead=true;
      for(let i=0;i<4;i++)
        parts.push({kind:'smoke',x:e.x,y:e.y,dx:(Math.random()-0.5)*24,dy:-8,t:0,dur:0.5,r:3});
    }
    if(e.y>H+34) e.dead=true;
  }
  enemies=enemies.filter(e=>!e.dead);
}

function updateBoss(dt){
  const k=diffScale();
  const b=boss;
  b.t+=dt;
  b.flash=Math.max(0,(b.flash||0)-dt);
  for(const pod of b.pods) if(pod.flash) pod.flash=Math.max(0,pod.flash-dt);
  if(!b.ready){
    if(b.kind===5){ // the wyrm is already beneath you
      b.ready=true; b.hidden=true; b.x=W/2; b.y=60;
      msg('WARNING — SAND WYRM',2.2);
      shake=5; sfx.warn();
      return;
    }
    b.y+=dt*44;
    const ty=b.kind>=100?76:95;
    if(b.y>=ty){
      b.y=ty; b.ready=true;
      msg({1:'WARNING — CORE FORTRESS',2:'WARNING — SIEGE CRAWLER',
        3:'WARNING — NIGHT HARRIER',4:'WARNING — THE DREDGER',
        6:'WARNING — THE WARDEN',7:'WARNING — CARRIER ASHFALL',
        101:'WARNING — SENTRY GATE',102:'WARNING — DRILL BARGE',
        103:'WARNING — GEMINI INTERCEPTORS'}[b.kind],2.2);
    }
    return;
  }
  const frac=b.hp/b.maxHp;
  const alivePods=b.pods.filter(p=>p.hp>0);
  // movement phase: below 55% HP, main bosses periodically dive down-screen
  let diving=false;
  if(b.kind<=3){
    if(b.mode===undefined){ b.mode='hold'; b.moveT=4; }
    b.moveT-=dt;
    if(b.mode==='hold'){
      if(frac<=0.55&&b.moveT<=0){ b.mode='windup'; b.moveT=0.55; sfx.warn(); }
    }else if(b.mode==='windup'){
      if(b.moveT<=0){ b.mode='dive'; b.moveT=1.6; }
    }else if(b.mode==='dive'){
      diving=true;
      const q=clamp(1-b.moveT/1.6,0,1);
      b.y=95+Math.sin(Math.PI*q)*(b.kind===2?135:150);
      if(b.kind===2){ const tp=nearestP(b.x,b.y); b.x=clamp(b.x+clamp(tp.x-b.x,-1,1)*115*dt,60,W-60); } // crawler homes in
      if(b.moveT<=0){ b.mode='hold'; b.moveT=4.5+Math.random()*2; b.y=95; }
    }
  }
  if(b.kind===1){
    if(!diving) b.x=W/2+Math.sin(b.t*0.5)*34;
    if(!diving&&bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const pod of alivePods){
          const a=aimAng(b.x+pod.dx,b.y+pod.dy);
          for(let i=-2;i<=2;i++) eShoot(b.x+pod.dx,b.y+pod.dy,a+i*0.16,118*k);
        }
        b.at1=(frac>0.66?1.35:1.05)/k;
      }
      if(frac<=0.75){
        b.at2-=dt;
        if(b.at2<=0){
          for(let i=0;i<12;i++) eShoot(b.x,b.y+10,i*TAU/12+b.t,92*k);
          b.at2=1.8/k;
        }
      }
      if(frac<=0.42){
        b.at3-=dt;
        if(b.at3<=0){
          b.spir+=0.55;
          eShoot(b.x,b.y+10,b.spir,105*k);
          eShoot(b.x,b.y+10,b.spir+Math.PI,105*k);
          b.at3=0.1;
        }
      }
    }
  }else if(b.kind===3){ // NIGHT HARRIER — hunts in the dark
    if(!diving){
      b.x=W/2+Math.sin(b.t*0.6)*80;
      b.y=95+Math.sin(b.t*1.3)*22;
    }
    if(!diving&&bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const pod of alivePods){
          const a=aimAng(b.x+pod.dx,b.y+pod.dy);
          eShoot(b.x+pod.dx,b.y+pod.dy,a,130*k);
          eShoot(b.x+pod.dx,b.y+pod.dy,a+0.1,105*k);
        }
        b.at1=0.9/k;
      }
      if(frac<=0.7){
        b.at2-=dt;
        if(b.at2<=0){ // wide fan sweep
          for(let i=-6;i<=6;i++)
            eShoot(b.x,b.y+12,Math.PI/2+i*0.17,(96+Math.abs(i)*7)*k);
          b.at2=1.75/k;
        }
      }
      if(frac<=0.45){
        b.at3-=dt;
        if(b.at3<=0){ // kill the lights + twin spiral
          if(lightPulse<=0){ lightPulse=2.2; sfx.warn(); msg('LIGHTS OUT!',1); }
          b.spir+=0.5;
          eShoot(b.x,b.y+12,b.spir,100*k);
          eShoot(b.x,b.y+12,b.spir+Math.PI,100*k);
          b.at3=0.095;
        }
      }
    }
  }else if(b.kind===4){ // THE DREDGER — depth charges, currents, rising water
    b.x=W/2+Math.sin(b.t*0.35)*54;
    floodOn=frac<=0.55;
    if(floodOn&&!b.warned){ b.warned=1; msg('HULL BREACH — DECK FLOODING',2); sfx.warn(); }
    if(bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        const tp=nearestP(b.x,b.y);
        const n=frac<0.7?5:3;
        for(let i=0;i<n;i++)
          lobs.push({x:b.x,y:b.y+12,
            tx:clamp(tp.x+(Math.random()-0.5)*110,16,W-16),
            ty:clamp(tp.y+(Math.random()-0.5)*90,150,H-24),
            t:0,dur:1.15});
        b.at1=1.7/k;
      }
      b.at2-=dt;
      if(b.at2<=0){ b.vd=-b.vd; ventPush=b.vd; ventT=1.9; b.at2=2.8/k; }
      b.at3-=dt;
      if(b.at3<=0){
        for(const pod of alivePods){
          const a=aimAng(b.x+pod.dx,b.y+pod.dy);
          eShoot(b.x+pod.dx,b.y+pod.dy,a,120*k);
          eShoot(b.x+pod.dx,b.y+pod.dy,a+0.1,100*k);
        }
        b.at3=1.1/k;
      }
    }
  }else if(b.kind===5){ // SAND WYRM — erupts along telegraphed lines
    b.wT-=dt;
    if(b.wstate==='burrow'){
      b.x=W/2; b.y=60; b.segs=[];
      if(!b.path&&b.wT<=1.2){
        b.runs=(b.runs||0)+1;
        const side=hash(b.runs*17+loop*7)>0.5;
        const y1=130+hash(b.runs*29+area)*190, y2=130+hash(b.runs*41+area)*210;
        const A=side?{x:-24,y:y1}:{x:W+24,y:y1};
        const B=side?{x:W+24,y:y2}:{x:-24,y:y2};
        const dx2=B.x-A.x, dy2=B.y-A.y, m=Math.hypot(dx2,dy2);
        b.path={A,B,nx:-dy2/m,ny:dx2/m};
      }
      if(b.wT<=0&&b.path){
        b.wstate='surface'; b.hidden=false; b.sT=0; b.trail=[];
        boomFx(b.path.A.x,b.path.A.y,false); sfx.bigBoom(); shake=5;
        if(bombSuppress<=0)
          for(let i=0;i<8;i++) eShoot(b.path.A.x,b.path.A.y,i*TAU/8,80*k);
      }
    }else{
      const dur=frac<0.5?2.5:3.3;
      b.sT+=dt;
      const q=Math.min(1,b.sT/dur);
      const pa=b.path;
      const hx=pa.A.x+(pa.B.x-pa.A.x)*q+pa.nx*Math.sin(q*Math.PI*2)*46;
      const hy=pa.A.y+(pa.B.y-pa.A.y)*q+pa.ny*Math.sin(q*Math.PI*2)*46;
      if(b.trail.length) b.heading=Math.atan2(hy-b.trail[0].y,hx-b.trail[0].x);
      b.trail.unshift({x:hx,y:hy});
      if(b.trail.length>140) b.trail.pop();
      b.segs=[];
      for(let i=0;i<10;i++) b.segs.push(b.trail[Math.min(i*9,b.trail.length-1)]);
      b.x=hx; b.y=hy;
      if(Math.random()<0.4)
        parts.push({kind:'smoke',x:hx+(Math.random()-0.5)*16,y:hy+8,dx:(Math.random()-0.5)*20,dy:-6,t:0,dur:0.5,r:4});
      if(bombSuppress<=0&&anyAlive()&&q>0.12&&q<0.88){
        b.at1-=dt;
        if(b.at1<=0){
          const a=aimAng(hx,hy);
          eShoot(hx,hy,a,115*k); eShoot(hx,hy,a+0.14,100*k);
          b.at1=1.15/k;
        }
      }
      if(q>=1){
        boomFx(pa.B.x,pa.B.y,false); shake=4;
        if(bombSuppress<=0)
          for(let i=0;i<8;i++) eShoot(pa.B.x,pa.B.y,i*TAU/8+0.4,80*k);
        b.hidden=true; b.wstate='burrow'; b.path=null; b.segs=[];
        b.wT=frac<0.5?1.7:2.5;
      }
    }
  }else if(b.kind===6){ // THE WARDEN — cages you in raised barriers
    b.x=W/2+Math.sin(b.t*0.5)*40;
    const exposed=alivePods.length===0;
    if(!b.hint&&b.t>2&&!exposed){ b.hint=1; msg('DESTROY THE FOUR PYLONS',2.2); }
    if(exposed&&!b.exMsg){ b.exMsg=1; msg('CORE EXPOSED!',1.6); tempWalls=[]; }
    if(bombSuppress<=0&&anyAlive()){
      if(!exposed){
        b.at1-=dt;
        if(b.at1<=0){
          ringWalls(nearestP(b.x,b.y));
          sfx.warn();
          b.volley=1.0;
          b.at1=6/k;
        }
        if(b.volley>0){
          b.volley-=dt;
          if(b.volley<=0)
            for(const pod of alivePods){
              const a=aimAng(b.x+pod.dx,b.y+pod.dy);
              for(const o of [-0.15,0,0.15]) eShoot(b.x+pod.dx,b.y+pod.dy,a+o,112*k);
            }
        }
        if(frac<=0.7){
          b.at2-=dt;
          if(b.at2<=0){
            lineWalls();
            for(let x=12;x<W;x+=18) eShoot(x,b.y+28,Math.PI/2,78*k);
            b.at2=5.6/k;
          }
        }
      }else{
        b.at3-=dt;
        if(b.at3<=0){
          b.spir+=0.55;
          eShoot(b.x,b.y+14,b.spir,105*k);
          eShoot(b.x,b.y+14,b.spir+Math.PI,105*k);
          b.at3=0.12;
        }
      }
    }
  }else if(b.kind===7){ // THE CARRIER — shield drops only for launch windows
    b.x=W/2+Math.sin(b.t*0.3)*36;
    const gensAlive=alivePods.length>0;
    if(!b.hint&&b.t>2&&gensAlive){ b.hint=1; msg('CATAPULTS POWER THE SHIELD',2.2); }
    b.launchT-=dt;
    if(b.open>0){
      b.open-=dt;
      b.doorQ=Math.min(1,b.doorQ+dt*4);
      if(!b.spawned){
        b.spawned=true;
        if(enemies.length<9&&gensAlive){
          spawnE('grunt',b.x-28,{y:b.y+46});
          spawnE('drone',b.x+28,{y:b.y+42});
          if(frac<0.5) spawnE('grunt',b.x,{y:b.y+50});
        }
      }
      if(b.open<=0){ b.launchT=(frac<0.5?3.0:4.2)/k; b.spawned=false; }
    }else{
      b.doorQ=Math.max(0,b.doorQ-dt*3);
      if(b.launchT<=0&&gensAlive) b.open=1.7;
    }
    b.shielded=gensAlive&&b.open<=0;
    if(!gensAlive&&!b.gMsg){ b.gMsg=1; msg('SHIELD GENERATORS DOWN!',1.8); }
    if(bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const ox of [-22,22]){
          const a=aimAng(b.x+ox,b.y+32);
          eShoot(b.x+ox,b.y+32,a,118*k);
          eShoot(b.x+ox,b.y+32,a,96*k);
        }
        b.at1=1.5/k;
      }
      if(frac<=0.5){
        b.at2-=dt;
        if(b.at2<=0){
          for(let i=-5;i<=5;i++) eShoot(b.x,b.y+36,Math.PI/2+i*0.16,(86+Math.abs(i)*6)*k);
          b.at2=3.2/k;
        }
      }
      if(frac<=0.25){
        b.at3-=dt;
        if(b.at3<=0){
          if(enemies.length<9) spawnE('grunt',clamp(b.x+(Math.random()-0.5)*80,20,W-20),{y:b.y+50});
          b.at3=3/k;
        }
      }
    }
  }else if(b.kind===103){ // GEMINI INTERCEPTORS — survivor enrages
    const en2=b.twins.filter(t2=>!t2.dead);
    b.hp=b.twins.reduce((s,t2)=>s+Math.max(0,t2.hp),0);
    const enr=en2.length===1;
    const sp=enr?1.45:1;
    b.twins.forEach((tw,i)=>{
      if(tw.dead) return;
      const s=i===0?-1:1;
      tw.x=W/2+s*Math.sin(b.t*0.9*sp)*70;
      tw.y=82+Math.sin(b.t*1.8*sp+(i?Math.PI:0))*26;
    });
    if(bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const tw of en2){
          const a=aimAng(tw.x,tw.y);
          eShoot(tw.x,tw.y,a,120*k);
          eShoot(tw.x,tw.y,a+0.12,105*k);
          if(enr) eShoot(tw.x,tw.y,a-0.12,105*k);
        }
        b.at1=(enr?1.0:1.6)/k;
      }
      b.at2-=dt;
      if(b.at2<=0){
        for(const tw of en2){
          const inw=tw.x<W/2?0.5:-0.5;
          for(let j=-2;j<=2;j++) eShoot(tw.x,tw.y,Math.PI/2+inw+j*0.14,95*k);
        }
        b.at2=3.4/k;
      }
    }
  }else if(b.kind===101){ // SENTRY GATE — emitters alternate aimed spreads
    b.x=W/2+Math.sin(b.t*0.7)*56;
    if(bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        b.side=b.side===1?-1:1;
        const sides=frac<=0.6?[-1,1]:[b.side]; // wounded: both emitters at once
        for(const sd of sides){
          const ex=b.x+58*sd;
          const a=aimAng(ex,b.y);
          for(const o of [-0.18,0,0.18]) eShoot(ex,b.y,a+o,115*k);
        }
        b.at1=0.95/k;
      }
      if(frac<=0.65){
        b.at2-=dt;
        if(b.at2<=0){
          for(let i=0;i<10;i++) eShoot(b.x,b.y,i*TAU/10+b.t,95*k);
          b.at2=1.8/k;
        }
      }
    }
  }else if(b.kind===102){ // DRILL BARGE — twin volleys + mine drops
    b.x=W/2+Math.sin(b.t*0.9)*70;
    if(bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const ox of [-58,58]){
          const a=aimAng(b.x+ox,b.y);
          eShoot(b.x+ox,b.y,a,125*k);
          eShoot(b.x+ox,b.y,a,100*k);
        }
        b.at1=1.05/k;
      }
      if(frac<=0.5){
        b.at2-=dt;
        if(b.at2<=0){
          spawnE('mine',clamp(b.x+(Math.random()-0.5)*100,20,W-20),{y:b.y+34,phase:1,arm:1.6});
          b.at2=2.4/k;
        }
      }
    }
  }else{ // SIEGE CRAWLER
    if(!diving) b.x=W/2+Math.sin(b.t*0.4)*70;
    if(!diving&&bombSuppress<=0&&anyAlive()){
      b.at1-=dt;
      if(b.at1<=0){
        for(const pod of alivePods){
          const a=aimAng(b.x+pod.dx,b.y+pod.dy);
          for(const o of [-0.12,0,0.12]) eShoot(b.x+pod.dx,b.y+pod.dy,a+o,125*k);
        }
        b.at1=(frac>0.35?1.25:0.9)/k;
      }
      if(frac<=0.7){
        b.at2-=dt;
        if(b.at2<=0){ // bullet wall with a gap
          const gap=40+Math.random()*(W-80);
          for(let x=8;x<W;x+=16)
            if(Math.abs(x-gap)>34) eShoot(x,b.y+42,Math.PI/2,92*k);
          b.at2=2.5/k;
        }
      }
      if(frac<=0.35){
        b.at3-=dt;
        if(b.at3<=0){
          spawnE('mine',clamp(b.x+(Math.random()-0.5)*90,20,W-20),{y:b.y+46,phase:1,arm:1.5});
          b.at3=2.0/k;
        }
      }
    }
  }
  bossDropT-=dt;
  if(bossDropT<=0){
    b.dropN=(b.dropN||0)+1;
    const armor=(b.kind===4||b.kind===6||b.kind===7)&&b.dropN%2===0;
    spawnP(armor?'A':'E',40+Math.random()*(W-80));
    bossDropT=20;
  }
  if(b.hp<=0){
    if(b.kind>=100){ // mid-boss breached — scroll resumes, no tally
      boss=null;
      addScore(5000); popup(b.x,b.y,'+5000');
      msg('BREACHED!  +5000',1.6);
      sfx.bigBoom(); buzz(100); shake=7;
      hitStop=Math.min(0.08,hitStop+0.06);
      for(let i=0;i<3;i++)
        setTimeout(()=>{ boomFx(b.x-70+Math.random()*140,b.y-14+Math.random()*28,true); sfx.bigBoom(); }, i*160);
      return;
    }
    boss=null;
    floodOn=false; tempWalls=[]; lobs=[]; ventT=0;
    addScore(10000); popup(b.x,b.y,'+10000');
    jingle(); buzz([120,60,120]);
    for(let i=0;i<7;i++)
      setTimeout(()=>{ boomFx(b.x-60+Math.random()*120,b.y-30+Math.random()*70,true); sfx.bigBoom(); shake=8; }, i*180);
    tally={t:-0.8,shown:0,lines:[
      ['ENERGY BONUS',(()=>{const al=players().filter(p=>!p.out);const ea=al.length?al.reduce((s,p)=>s+p.energy,0)/al.length:0;return Math.floor(ea)*80;})()],
      ['NO-DEATH BONUS',deathsThisArea===0?5000:0],
      ['BEST CHAIN ×'+bestChain,bestChain*300],
      ['CANNON BONUS',podsKilled*1000],
      ['AREA BONUS',5000+2000*loop]]};
    state='clear';
  }
}

// shield walker frontal block: returns true if damage applied
function damageEnemy(e,b){
  if(e.type==='shield'&&!b.flame&&e.shieldOff<=0){
    const fa=aimAng(e.x,e.y);
    const bv=Math.atan2(b.dy,b.dx);
    if(Math.cos(bv)*Math.cos(fa)+Math.sin(bv)*Math.sin(fa)<-0.5){
      sfx.clink();
      parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*80,dy:(Math.random()-0.5)*80,t:0,dur:0.18,c:'#aef'});
      return false;
    }
  }
  e.hp-=b.dmg;
  return true;
}

function updateWorld(dt){
  if(!boss){
    dst+=scrollSpd*dt;
    while(evIdx<events.length&&events[evIdx].d<=dst){ events[evIdx].f(); evIdx++; }
    if(state==='play'&&!midDone&&area<7&&dst>=levelLen*0.55){ // halfway checkpoint
      midDone=true;
      const gemini=loop>=2&&hash(loop*131+area*17)>0.5; // loop 2+: twins may ambush instead
      boss=makeBoss(gemini?103:(area===2?102:101));
      bossDropT=18;
    }
    if(state==='play'&&evIdx>=events.length&&dst>=levelLen&&enemies.length===0){
      boss=makeBoss(area);
      bossDropT=18;
    }
  }else updateBoss(dt);

  updateEnemies(dt);

  for(const b of pbul){
    b.x+=b.dx*dt; b.y+=b.dy*dt;
    if(b.life!==undefined){ b.life-=dt; if(b.life<=0) b.gone=true; }
    if(!b.gone&&solidAt(b.x,b.y)){ // barriers stop shots
      b.gone=true;
      parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*70,dy:-30,t:0,dur:0.15,c:'#cdd4dd'});
    }
  }
  pbul=pbul.filter(b=>!b.gone&&b.x>-8&&b.x<W+8&&b.y>-8&&b.y<H+8);
  for(const b of ebul){
    b.x+=b.dx*dt; b.y+=b.dy*dt;
    if(solidAt(b.x,b.y)) b.wall=true;
  }
  ebul=ebul.filter(b=>!b.wall&&b.x>-8&&b.x<W+8&&b.y>-8&&b.y<H+8);

  for(const p of pickups){ p.y+=scrollSpd*dt; p.t+=dt; }
  pickups=pickups.filter(p=>p.y<H+20);

  // sliding platforms
  gameT+=dt;
  for(const pl of plats){
    pl.px=pl.x;
    pl.x=clamp(pl.x0+Math.sin(gameT*pl.sp+pl.ph)*pl.range,26,W-26);
  }

  // arcing shells (Dredger depth charges)
  for(const l of lobs){
    l.t+=dt;
    if(l.t>=l.dur){
      l.done=true;
      boomFx(l.tx,l.ty,false); sfx.boom(); shake=Math.max(shake,3);
      if(bombSuppress<=0)
        for(let i=0;i<6;i++) eShoot(l.tx,l.ty,i*TAU/6+0.5,85*diffScale());
      for(const pl of players())
        if(pl.alive&&pl.invuln<=0&&dist2(l.tx,l.ty,pl.x,pl.y)<20*20) playerHit(pl);
    }
  }
  lobs=lobs.filter(l=>!l.done);

  // rising barriers (Warden)
  if(tempWalls.length){
    for(const w of tempWalls){
      const was=w.t; w.t+=dt;
      if(was<0.5&&w.t>=0.5){
        sfx.thud();
        const off2=dst%TS, baseRow2=Math.floor(dst/TS);
        const yy=(baseRow2+16-w.wr)*TS+off2+16;
        for(let i=0;i<3;i++)
          parts.push({kind:'smoke',x:w.c*TS+16,y:yy,dx:(Math.random()-0.5)*26,dy:-10,t:0,dur:0.5,r:4});
      }
    }
    tempWalls=tempWalls.filter(w=>w.t<w.life);
  }

  // bilge currents + deck flood (Dredger)
  if(ventT>0) ventT-=dt;
  flood=clamp(flood+((floodOn&&boss)?0.7:-0.7)*dt,0,1);

  for(const f of fx) f.t+=dt;
  fx=fx.filter(f=>f.t<f.dur);
  for(const p of parts){
    p.t+=dt; p.x+=p.dx*dt; p.y+=p.dy*dt;
    if(p.kind==='smoke'){ p.dy-=14*dt; }
    else { p.dx*=0.98; p.dy*=0.98; }
  }
  parts=parts.filter(p=>p.t<p.dur);
  for(const p of popups){ p.t+=dt; }
  popups=popups.filter(p=>p.t<0.8);
  for(const q of bombQ){
    q.d-=dt;
    if(q.d<=0){ boomFx(q.x,q.y,true); sfx.boom(); shake=Math.max(shake,5); }
  }
  bombQ=bombQ.filter(q=>q.d>0);

  chainT-=dt;
  if(chainT<=0){ chain=0; chainT=0; }

  //------------- collisions
  for(const b of pbul){
    // boss pods first (destructible), then core
    if(boss&&boss.ready){
      if(boss.kind===103){ // twins take hits individually
        let done=false;
        for(const tw of boss.twins){
          if(tw.dead||dist2(b.x,b.y,tw.x,tw.y)>=20*20) continue;
          tw.hp-=b.dmg; boss.flash=Math.max(boss.flash,0.06);
          if(!b.pierce) b.gone=true;
          sfx.hit(); ST.hits++;
          if(tw.hp<=0){
            tw.dead=true;
            boomFx(tw.x,tw.y,true); sfx.bigBoom(); shake=6;
            hitStop=Math.min(0.08,hitStop+0.06);
            addScore(1500); popup(tw.x,tw.y,'+1500');
            if(boss.twins.some(z=>!z.dead)) msg('ENRAGED!',1.2);
          }
          done=true; break;
        }
        if(done) continue;
      }else if(boss.kind===5){ // wyrm: armored body, soft tail node
        if(!boss.hidden&&boss.segs.length){
          const tail=boss.segs[boss.segs.length-1];
          if(tail&&dist2(b.x,b.y,tail.x,tail.y)<14*14){
            boss.hp-=b.dmg; boss.flash=Math.max(boss.flash,0.08);
            if(!b.pierce) b.gone=true;
            sfx.hit(); ST.hits++;
            parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*60,dy:40,t:0,dur:0.2,c:'#fff'});
            continue;
          }
          let blocked=false;
          for(let i=0;i<boss.segs.length-1;i++){
            const s=boss.segs[i];
            if(s&&dist2(b.x,b.y,s.x,s.y)<13*13){ blocked=true; break; }
          }
          if(blocked){
            if(!boss.armMsg){ boss.armMsg=1; popup(b.x,b.y-14,'ARMORED'); }
            if(!b.pierce){
              b.gone=true; sfx.clink();
              parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*80,dy:-20,t:0,dur:0.16,c:'#e8d8b0'});
            }
            continue;
          }
        }
      }else{
        let podHit=false;
        for(const pod of boss.pods){
          if(pod.hp>0&&dist2(b.x,b.y,boss.x+pod.dx,boss.y+pod.dy)<13*13){
            pod.hp-=b.dmg; pod.flash=0.15;
            if(!b.pierce) b.gone=true;
            sfx.hit(); podHit=true; ST.hits++;
            if(pod.hp<=0){
              boomFx(boss.x+pod.dx,boss.y+pod.dy,true);
              sfx.bigBoom(); shake=6;
              hitStop=Math.min(0.08,hitStop+0.06);
              podsKilled++;
              addScore(2000); popup(boss.x+pod.dx,boss.y+pod.dy,'+2000');
            }
            break;
          }
        }
        if(podHit) continue;
        let coreHit;
        if(boss.kind>=100){ // wide gate hull — three segments
          coreHit=false;
          for(const ox of [-58,0,58])
            if(dist2(b.x,b.y,boss.x+ox,boss.y)<23*23){ coreHit=true; break; }
        }else if(boss.kind===4||boss.kind===7){ // wide ships
          coreHit=false;
          for(const ox of [-52,0,52])
            if(dist2(b.x,b.y,boss.x+ox,boss.y+4)<26*26){ coreHit=true; break; }
        }else coreHit=dist2(b.x,b.y,boss.x,boss.y+8)<58*58;
        if(coreHit){
          const guarded=(boss.kind===6&&boss.pods.some(pp=>pp.hp>0))
                      ||(boss.kind===7&&boss.shielded);
          if(guarded){ // hard shield: pinged off
            if(!boss.shieldMsg){ boss.shieldMsg=1; popup(boss.x,boss.y+36,'SHIELDED'); }
            if(!b.pierce) b.gone=true;
            sfx.clink();
            parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*80,dy:-30,t:0,dur:0.18,c:'#9fe1ff'});
            continue;
          }
          boss.hp-=b.dmg; boss.flash=Math.max(boss.flash,0.08);
          if(!b.pierce) b.gone=true;
          sfx.hit(); ST.hits++;
          parts.push({kind:'spark',x:b.x,y:b.y,dx:(Math.random()-0.5)*60,dy:50,t:0,dur:0.2,c:'#fff'});
          continue;
        }
      }
    }
    for(const e of enemies){
      const br=e.r+3; // hitbox stays fixed — size is cosmetic
      if(e.dead||dist2(b.x,b.y,e.x,e.y)>=br*br) continue;
      if(b.pierce){
        if(b.hitIds.indexOf(e.id)>=0) continue;
        b.hitIds.push(e.id);
        if(damageEnemy(e,b)){ ST.hits++; if(e.hp<=0) killEnemy(e); }
      }else{
        const ok=damageEnemy(e,b);
        b.gone=true;
        if(ok){ ST.hits++; if(e.hp<=0) killEnemy(e); else sfx.hit(); }
        break;
      }
    }
  }
  pbul=pbul.filter(b=>!b.gone);
  enemies=enemies.filter(e=>!e.dead);

  for(const pl of players()){
    if(!pl.alive||pl.invuln>0) continue;
    for(const b of ebul){
      if(dist2(b.x,b.y,pl.x,pl.y)<6*6){ b.hit=true; playerHit(pl); break; }
    }
    ebul=ebul.filter(b=>!b.hit);
    if(pl.alive&&pl.invuln<=0) for(const e of enemies){
      if(dist2(e.x,e.y,pl.x,pl.y)<(e.r+4)*(e.r+4)){ playerHit(pl); break; }
    }
    if(pl.alive&&pl.invuln<=0&&bossTouch(pl.x,pl.y)) playerHit(pl);
  }

  for(const p of pickups){
    for(const pl of players()){
      if(!pl.alive||dist2(p.x,p.y,pl.x,pl.y)>=17*17) continue;
      p.got=true; sfx.pickup();
      if(p.kind==='E'){ pl.energy=Math.min(100,pl.energy+40); msg('ENERGY +40',1); }
      if(p.kind==='W'){ pl.weapon^=1; msg(pl.weapon?'3-WAY SHOT':'TWIN SHOT',1.2); }
      if(p.kind==='B'){ pl.bombs=Math.min(5,pl.bombs+1); msg('BOMB +1',1); }
      if(p.kind==='S'){ addScore(1000); popup(p.x,p.y,'+1000'); }
      if(p.kind==='P'){
        if(pl.power<5){ pl.power++; msg('POWER UP! LV'+pl.power,1.2); }
        else { addScore(500); popup(p.x,p.y,'+500'); msg('MAX POWER',1); }
      }
      if(p.kind==='F'){ pl.superT=8; msg('SUPER BURNER!',1.4); }
      if(p.kind==='A'){ // armor plate — restores a shield pip
        const cap=SET.diff==='normal'?3:1;
        if(pl.shield<cap){ pl.shield++; msg('ARMOR +1',1.2); }
        else { addScore(500); popup(p.x,p.y,'+500'); }
      }
      break;
    }
  }
  pickups=pickups.filter(p=>!p.got);

  bombSuppress=Math.max(0,bombSuppress-dt);
  shake=Math.max(0,shake-dt*22);
  flash=Math.max(0,flash-dt*2.2);
  alarmT=Math.max(0,alarmT-dt);
  lightPulse=Math.max(0,lightPulse-dt*0.5);
  if(msgTimer>0) msgTimer-=dt;
}

function update(dt){
  readInput();
  setSong(songForNow());
  if(state==='title'){
    dst+=8*dt; // ambient scroll behind menu
  }else if(state==='clear'){
    updateWorld(dt);
    updatePlayerFor(P,input,dt);
    if(P2) updatePlayerFor(P2,input2,dt);
    checkAllOut();
    if(tally){
      tally.t+=dt;
      if(tally.shown<tally.lines.length){
        if(tally.t>=0.55){ // reveal bonuses one by one
          tally.t=0;
          const L=tally.lines[tally.shown++];
          addScore(L[1]);
          if(L[1]>0) sfx.pickup(); else sfx.blip();
        }
      }else if(tally.t>=1.6){
        tally=null; ST.areas++; nextLoop(); state='play';
      }
    }
  }else if(state==='play'&&!paused){
    if(hitStop>0){ hitStop=Math.max(0,hitStop-dt); }
    else{
      updateWorld(dt);
      updatePlayerFor(P,input,dt);
      if(P2) updatePlayerFor(P2,input2,dt);
      checkAllOut();
    }
  }
  input.bomb=false; input2.bomb=false;
}

//------------------------------------------------- drawing
const FONT='"Segoe UI",system-ui,sans-serif';

// Blackout Sector darkness: a mask with light carved out around sources
const darkCvs=document.createElement('canvas');
darkCvs.width=W; darkCvs.height=H;
const dg=darkCvs.getContext('2d');
function dHole(x,y,r,a){
  const g3=dg.createRadialGradient(x,y,0,x,y,r);
  g3.addColorStop(0,'rgba(0,0,0,'+a+')');
  g3.addColorStop(0.6,'rgba(0,0,0,'+(a*0.7)+')');
  g3.addColorStop(1,'rgba(0,0,0,0)');
  dg.fillStyle=g3; dg.fillRect(x-r,y-r,r*2,r*2);
}
function renderDarkness(){
  dg.setTransform(1,0,0,1,0,0);
  dg.globalCompositeOperation='source-over';
  dg.clearRect(0,0,W,H);
  const base=0.85+(lightPulse>0?0.07*Math.min(1,lightPulse):0);
  dg.fillStyle='rgba(3,5,16,'+base+')';
  dg.fillRect(0,0,W,H);
  dg.globalCompositeOperation='destination-out';
  const lr=lightPulse>0?0.55:1; // boss can dim your lamp
  for(const pl of players()) if(pl.alive) dHole(pl.x,pl.y,108*lr,1);
  for(const p of pickups) dHole(p.x,p.y,32,0.9);
  for(const e of enemies){
    dHole(e.x,e.y,e.type==='spotter'?30:20,0.8);
    if(e.type==='spotter'){ // the searchlight carves a bright wedge
      dg.beginPath(); dg.moveTo(e.x,e.y);
      dg.arc(e.x,e.y,150,e.dir-0.33,e.dir+0.33); dg.closePath();
      const wg=dg.createRadialGradient(e.x,e.y,8,e.x,e.y,150);
      wg.addColorStop(0,'rgba(0,0,0,0.95)');
      wg.addColorStop(1,'rgba(0,0,0,0.12)');
      dg.fillStyle=wg; dg.fill();
    }
  }
  for(const b of ebul) dHole(b.x,b.y,12,0.9);
  for(const b of pbul) dHole(b.x,b.y,9,0.8);
  for(const f of fx) dHole(f.x,f.y,(f.big?52:24)*2.0*(f.t/f.dur+0.35),1);
  for(const pl of plats){
    const yT=platScreenY(pl);
    if(yT<H&&yT+128>0){ dHole(pl.x,yT+6,22,0.8); dHole(pl.x,yT+122,22,0.8); }
  }
  if(boss) dHole(boss.x,boss.y+8,115,1);
}

function drawBG(){
  const T=TILESETS[AREA_PAL[area]];
  const cols=Math.ceil(W/TS);
  const off=dst%TS, baseRow=Math.floor(dst/TS), rows=Math.ceil(H/TS)+1;
  for(let ry=-1;ry<rows;ry++){
    const wr=baseRow+rows-ry;
    const y=ry*TS+off;
    for(let cx=0;cx<cols;cx++){
      const tt=tileAt(wr,cx);
      if(tt==='ground'){
        const h=hash(wr*97+cx*13);
        let spr;
        if(h>0.93) spr=T.vent;
        else if(h>0.86) spr=T.plate;
        else if(h>0.815) spr=T.pipes;
        else if(h>0.77) spr=T.grate;
        else if(h<0.06) spr=T.crater;
        else spr=T.tiles[(h*6|0)%4];
        ctx.drawImage(spr,cx*TS,y,TS,TS);
        if(h<=0.77&&h>=0.06){ // painted decals on plain plates
          const hd=hash(wr*53+cx*29+7);
          if(hd>0.962) ctx.drawImage(T.chev,cx*TS,y,TS,TS);
          else if(hd<0.028) ctx.drawImage(T.sten,cx*TS,y,TS,TS);
          if((cx===2||cx===7)&&wr%3!==0){ // service lane dashes
            ctx.fillStyle='rgba(255,255,255,0.05)';
            ctx.fillRect(cx*TS+TS-2,y+3,2,TS-10);
          }
        }
        if(spr===T.vent){
          const pu=0.45+0.3*Math.sin(perf*2.2+wr*1.7+cx);
          glow(cx*TS+16,y+16,44,T.ventGlow,pu*0.38);
        }
        if(tileAt(wr+1,cx)==='pit'){ // rim marking — chasm directly ahead
          for(let sx=0;sx<TS;sx+=8){
            ctx.fillStyle='#d8b830'; ctx.fillRect(cx*TS+sx,y,4,3);
            ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(cx*TS+sx+4,y,4,3);
          }
        }
      }else if(tt==='wall'){
        ctx.drawImage(T.tiles[(hash(wr*97+cx*13)*6|0)%4],cx*TS,y,TS,TS);
        ctx.drawImage(T.wall,cx*TS,y,TS,TS);
      }else if(tt==='pit'){
        ctx.drawImage(T.pit,cx*TS,y,TS,TS);
        const up=tileAt(wr+1,cx);
        if(up!=='pit'&&up!=='bridge'){
          ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(cx*TS,y,TS,2);
          ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(cx*TS,y+2,TS,5);
        }
        const dn=tileAt(wr-1,cx);
        if(dn!=='pit'&&dn!=='bridge'){
          ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(cx*TS,y+TS-2,TS,2);
        }
      }else if(tt==='bridge'){
        ctx.drawImage(T.bridge,cx*TS,y,TS,TS);
      }else if(tt==='convL'||tt==='convR'){
        ctx.drawImage(T.conv,cx*TS,y,TS,TS);
        const dir=tt==='convR'?1:-1;
        const o=((perf*46*dir)%16+16)%16;
        ctx.strokeStyle=T.convStripe; ctx.lineWidth=2;
        for(let s=0;s<3;s++){
          const sx=cx*TS+((o+s*16)%TS);
          if(sx<cx*TS+5||sx>cx*TS+TS-5) continue;
          ctx.beginPath();
          ctx.moveTo(sx-4*dir,y+7); ctx.lineTo(sx+3*dir,y+16); ctx.lineTo(sx-4*dir,y+25);
          ctx.stroke();
        }
      }else if(tt==='water'){
        ctx.drawImage(T.water,cx*TS,y,TS,TS);
        const sh=(perf*14+wr*11+cx*23)%TS;
        ctx.fillStyle=T.waterHi;
        ctx.fillRect(cx*TS+4,y+sh,TS-8,1.6);
        const sh2=(perf*9+wr*17+cx*31+16)%TS;
        ctx.fillRect(cx*TS+8,y+sh2,TS-16,1);
        if(hash(wr*7+cx*3)>0.7){
          const gx=cx*TS+6+hash(wr*13+cx)*(TS-12);
          ctx.fillRect(gx,y+((sh+11)%TS),3,1.2);
        }
      }
    }
    if(wr%14===0){
      ctx.fillStyle=T.haz0;
      ctx.fillRect(0,y+TS-5,W,5);
      ctx.fillStyle=T.haz1;
      for(let x=-6;x<W;x+=14) ctx.fillRect(x+((wr*3)%14),y+TS-5,7,5);
      ctx.fillStyle='rgba(255,255,255,0.06)';
      ctx.fillRect(0,y+TS-5,W,1);
    }
  }
  // sliding platforms (above terrain, below entities)
  for(const pl of plats){
    const yT=platScreenY(pl);
    if(yT>H||yT+128<0) continue;
    ctx.drawImage(T.raft,pl.x-18,yT,36,128);
    glow(pl.x,yT+6,14,T.ventGlow,0.35+0.15*Math.sin(perf*8));
    glow(pl.x,yT+122,14,T.ventGlow,0.35+0.15*Math.sin(perf*8+2));
  }
  for(let i=0;i<3;i++){
    const cy=((dst*1.35+i*560+perf*7)%(H+560))-280;
    const cxp=W/2+Math.sin(perf*0.07+i*2.3)*150;
    ctx.globalAlpha=0.6;
    ctx.drawImage(cloudSpr,cxp-140,cy-140,280,280);
    ctx.globalAlpha=1;
  }
}

function drawPlayer(pl){
  if(!pl.alive){
    if(pl.fellT>0){ // tumbling down into the chasm
      const q=pl.fellT/0.7;
      ctx.save(); ctx.translate(pl.x,pl.y);
      ctx.globalAlpha=q;
      ctx.rotate((1-q)*4.5);
      ctx.scale(q,q);
      ctx.fillStyle=pl.pal.fell; rrFill(-6.5,-9,13,13,3.5);
      ctx.fillStyle=pl.pal.pad0; ctx.fillRect(-9,-7,3,6); ctx.fillRect(6,-7,3,6);
      ctx.fillStyle=pl.pal.h1;
      ctx.beginPath(); ctx.arc(0,-3,5,0,TAU); ctx.fill();
      ctx.restore();
    }
    return;
  }
  // spawn beam
  if(pl.spawnT>0){
    const q=pl.spawnT/0.6;
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=q*0.8;
    const bg2=ctx.createLinearGradient(0,0,0,pl.y);
    bg2.addColorStop(0,'rgba(140,220,255,0)');
    bg2.addColorStop(1,'rgba(190,240,255,0.9)');
    ctx.fillStyle=bg2;
    ctx.fillRect(pl.x-5*q-2,0,10*q+4,pl.y);
    ctx.restore();
    glow(pl.x,pl.y,60*q+20,'cyan',0.8*q+0.2);
    if(pl.spawnT>0.35) return; // player materializes near the end
    ctx.save(); ctx.globalAlpha=1-(pl.spawnT/0.35);
    drawPlayerBody(pl);
    ctx.restore();
    return;
  }
  drawPlayerBody(pl);
}
function drawPlayerBody(pl){
  const a=Math.atan2(pl.lockFy,pl.lockFx)+Math.PI/2;

  if(flicker) ctx.globalAlpha=0.45;
  ctx.rotate(a);
  const step=Math.sin(pl.walk)*3;
  if(pl.moving) glow(0,7,16,'cyan',0.5+0.25*Math.sin(perf*22));
  // boots with soles

  ctx.fillStyle='#8a5a2a';
  ctx.fillRect(-5.5,-2+step,4,3); ctx.fillRect(1.5,-2-step,4,3);
  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.fillRect(-5.5,-2+step,4,1); ctx.fillRect(1.5,-2-step,4,1);
  // backpack with twin thruster nozzles

  // torso with rim light, center seam and belt

  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;

  ctx.strokeStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.moveTo(0,-8.5); ctx.lineTo(0,3); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-6.5,1.2,13,1.7);
  ctx.fillStyle='#c8a040'; ctx.fillRect(-1.4,1.2,2.8,1.7); // buckle
  // chest core
  ctx.fillStyle='#c8f7ff'; ctx.fillRect(-1.5,-4.5,3,3);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillRect(-1.5,-4.5,3,1);
  glow(0,-3,10,'cyan',0.4);
  // shoulder pads with strap lines
  gr=ctx.createLinearGradient(0,-8,0,0);

    const sa=pl.invuln>0?0.35+0.25*Math.sin(perf*10):0.12+0.04*Math.sin(perf*4);

function drawEnemy(e){
  const a=aimAng(e.x,e.y);
  const charge=e.ft<0.35&&e.y>0?(0.35-e.ft)/0.35:0;
  ctx.save(); ctx.translate(e.x,e.y);
  switch(e.type){
    case 'grunt':{
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(0,3,7,4,0,0,TAU); ctx.fill();
      ctx.rotate(a+Math.PI/2);
      const step=Math.sin(e.t*9)*2;
      ctx.fillStyle='#2a1010'; ctx.fillRect(-4.5,-1+step,3.4,6); ctx.fillRect(1.1,-1-step,3.4,6);
      ctx.fillStyle='#4a1c1c'; ctx.fillRect(-4.5,-1+step,3.4,2.4); ctx.fillRect(1.1,-1-step,3.4,2.4);
      let gr=ctx.createLinearGradient(-5,-7,5,4);
      gr.addColorStop(0,'#d96060'); gr.addColorStop(0.5,'#a33232'); gr.addColorStop(1,'#5e1616');
      ctx.fillStyle=gr; rrFill(-5.5,-7.5,11,11,3);
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(0,1); ctx.stroke();
      ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-5.5,1,11,1.6);
      ctx.fillStyle='#7a2424'; rrFill(-8,-6.5,3,5.5,1.5); rrFill(5,-6.5,3,5.5,1.5);
      ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(-8,-6.5,3,1.2); ctx.fillRect(5,-6.5,3,1.2);
      ctx.fillStyle='#9a9eae'; ctx.fillRect(-1,-14,2.4,8);
      ctx.fillStyle='#c9ccd6'; ctx.fillRect(-1,-14,2.4,2.5);
      ctx.fillStyle='#565b6a'; ctx.fillRect(-1.8,-7.6,4,2);
      if(charge>0) glow(0,-14,14,'red',charge*0.8);
      ctx.strokeStyle='#7d2020'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(4,-2); ctx.lineTo(6.5,-8); ctx.stroke();
      if(Math.floor(e.t*4)%2){ ctx.fillStyle='#ff9a5a'; ctx.fillRect(5.9,-9.2,1.6,1.6); }
      const hg=ctx.createRadialGradient(-1,-4.5,0.5,0,-3,4.5);
      hg.addColorStop(0,'#c05555'); hg.addColorStop(1,'#571212');
      ctx.fillStyle=hg;
      ctx.beginPath(); ctx.arc(0,-3,4.2,0,TAU); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(-1.4,-4.4,1.4,0,TAU); ctx.fill();
      ctx.fillStyle='#ffd0d0'; ctx.fillRect(-2.6,-5,5.2,1.6);
      ctx.fillStyle='#2a0808'; ctx.fillRect(-0.4,-5,0.8,1.6);
      glow(0,-4.4,8,'red',0.5);
      break;
    }
    case 'turret':{
      let gr=ctx.createLinearGradient(-11,-11,11,11);
      gr.addColorStop(0,'#4c5a66'); gr.addColorStop(1,'#232b33');
      ctx.fillStyle=gr; rrFill(-11.5,-11.5,23,23,5);
      ctx.strokeStyle='rgba(255,255,255,0.09)'; rrPath(ctx,-11.5,-11.5,23,23,5); ctx.stroke();
      ctx.fillStyle='#7c8ea0';
      for(const px of [-8.5,8.5]) for(const py of [-8.5,8.5]){
        ctx.beginPath(); ctx.arc(px,py,1.5,0,TAU); ctx.fill();
      }
      ctx.fillStyle='rgba(216,184,48,0.30)';
      for(let i=0;i<3;i++) ctx.fillRect(-6+i*5,-11.5,2.5,2);
      ctx.fillStyle='#161c22'; rrFill(-8,-8,16,16,4);

      ctx.rotate(-a);

      ctx.fillStyle=cg;
      ctx.beginPath(); ctx.arc(0,0,5.4,0,TAU); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;

    }
    case 'drone':{
      ctx.fillStyle='rgba(0,0,0,0.28)';

      ctx.strokeStyle='rgba(200,215,230,0.35)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(11,0);
      ctx.moveTo(0,-11); ctx.lineTo(0,11); ctx.stroke();

      const gr=ctx.createRadialGradient(-2,-3,1,0,0,10);
      gr.addColorStop(0,'#c3ccd6'); gr.addColorStop(0.55,'#7d8894'); gr.addColorStop(1,'#454d58');
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.ellipse(0,0,9.5,6.5,0,0,TAU); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.ellipse(0,0,6.6,4.3,0,0,TAU); ctx.stroke();
      ctx.fillStyle='#5a6570';
      ctx.beginPath(); ctx.moveTo(0,4.5); ctx.lineTo(-1.5,9); ctx.lineTo(1.5,9); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#39434d'; ctx.fillRect(-1,5.2,2,2.6);
      ctx.fillStyle='rgba(120,200,255,0.30)';
      ctx.beginPath(); ctx.ellipse(0,-1.6,4,2.5,0,0,TAU); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.ellipse(-1.3,-2.3,1.7,0.9,-0.4,0,TAU); ctx.fill();
      ctx.fillStyle='#39434d';
      ctx.beginPath(); ctx.arc(0,0,1.6,0,TAU); ctx.fill();
      const blink=Math.floor(e.t*6)%2;
      ctx.fillStyle=blink?'#ff5050':'#5aff8a';
      ctx.beginPath(); ctx.arc(0,1,2,0,TAU); ctx.fill();
      glow(0,1,12,blink?'red':'green',0.7);
      break;
    }
    case 'tank':{
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(0,4,14,6,0,0,TAU); ctx.fill();
      for(const tx of [-13,8]){
        ctx.fillStyle='#151d12'; rrFill(tx,-11,5.5,22,2);
        ctx.fillStyle='rgba(255,255,255,0.10)';
        const roll=(e.y*0.6)%5;
        for(let i=0;i<5;i++) ctx.fillRect(tx+0.8,-10+roll+i*5,3.9,1.4);

        ctx.beginPath(); ctx.arc(tx+2.75,-8,1.8,0,TAU); ctx.fill();

      }

      gr.addColorStop(0,'#6f9457'); gr.addColorStop(0.5,'#48663a'); gr.addColorStop(1,'#263a1e');

      ctx.strokeStyle='rgba(255,255,255,0.08)'; rrPath(ctx,-9.5,-9.5,19,19,3.5); ctx.stroke();
